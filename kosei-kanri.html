    {sheet?.type==="task"&&(()=>{
      const{task,site}=sheet;
      const cl=clients.find(c=>c.id===site.clientId);
      const wd=workDays(task);
      const sl=skipLabel(task);
      return(
        <div onClick={()=>setSheet(null)} style={{position:"fixed",inset:0,background:"rgba(15,23,42,.45)",zIndex:400,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:"16px 16px 0 0",width:"100%",maxWidth:480,maxHeight:"85vh",overflowY:"auto",boxShadow:"0 -8px 30px rgba(0,0,0,.15)"}}>
            <div style={{width:40,height:4,background:"#E2E8F0",borderRadius:2,margin:"12px auto 0"}}/>
            <div style={{background:site.color,padding:"11px 16px",margin:"10px 12px",borderRadius:10}}>
              <div style={{fontSize:16,fontWeight:900,color:"#fff"}}>{task.name}</div>
              <div style={{fontSize:11,color:"rgba(255,255,255,.75)",marginTop:2}}>{site.name} / {cl?.name||""}</div>
            </div>
            <div style={{padding:"0 14px 14px"}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
                {[{l:"開始日",v:task.start},{l:"終了日",v:task.end}].map(f=>(
                  <div key={f.l} style={{background:"#F8FAFC",borderRadius:9,padding:"9px 11px",border:"1px solid #E2E8F0"}}>
                    <div style={{fontSize:9,color:"#94A3B8",marginBottom:2}}>{f.l}</div>
                    <div style={{fontSize:14,fontWeight:700,color:"#1E293B"}}>{f.v}</div>
                  </div>
                ))}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:10}}>
                {[{l:"期間",v:`${drange(parseD(task.start),parseD(task.end)).length}日`,c:"#64748B"},{l:"稼働日数",v:`${wd}日`,c:"#4F46E5"},{l:"延べ人工",v:`${wd*(+task.workers||1)}人工`,c:"#F97316"}].map(f=>(
                  <div key={f.l} style={{background:"#F8FAFC",borderRadius:9,padding:"9px 5px",border:"1px solid #E2E8F0",textAlign:"center"}}>
                    <div style={{fontSize:9,color:"#94A3B8",marginBottom:2}}>{f.l}</div>
                    <div style={{fontFamily:"'Oswald',sans-serif",fontSize:16,fontWeight:700,color:f.c}}>{f.v}</div>
                  </div>
                ))}
              </div>
              <div style={{background:"#FFF7ED",borderRadius:9,padding:"9px 14px",border:"1px solid #FED7AA",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:12,color:"#92400E"}}>1日あたり予定人数</span>
                <span style={{fontFamily:"'Oswald',sans-serif",fontSize:22,fontWeight:700,color:site.color}}>{task.workers}<span style={{fontSize:12}}> 人</span></span>
              </div>
              {sl&&<div style={{background:"#EEF2FF",borderRadius:8,padding:"7px 12px",border:"1px solid #C7D2FE",fontSize:12,color:"#4F46E5",marginBottom:8}}>📅 {sl}</div>}
              {task.memo&&<div style={{background:"#F8FAFC",borderRadius:8,padding:"7px 12px",border:"1px solid #E2E8F0",fontSize:12,color:"#64748B",marginBottom:8}}><span style={{fontWeight:700,color:"#94A3B8"}}>備考：</span>{task.memo}</div>}
              {task.note&&<div style={{background:"#FFFBEB",borderRadius:8,padding:"7px 12px",border:"1px solid #FDE68A",fontSize:12,color:"#92400E",marginBottom:10}}><span style={{fontWeight:700}}>特記：</span>{task.note}</div>}

              {/* 日程スライド */}
              <div style={{background:"#F8FAFC",borderRadius:10,padding:"10px 12px",border:"1px solid #E2E8F0",marginBottom:10}}>
                <div style={{fontSize:11,fontWeight:700,color:"#475569",marginBottom:8}}>📅 日程をスライドする</div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {[-7,-3,-1,1,3,7].map(d=>(
                    <button key={d} onClick={()=>{slideTaskDays(task.id,d);setSheet(null);}}
                      style={{flex:1,minWidth:50,background:d<0?"#FEF2F2":"#F0FDF4",border:`1px solid ${d<0?"#FECACA":"#BBF7D0"}`,borderRadius:7,padding:"8px 4px",fontSize:12,color:d<0?"#DC2626":"#16A34A",fontWeight:700,cursor:"pointer"}}>
                      {d>0?`+${d}日`:`${d}日`}
                    </button>
                  ))}
                </div>
                <div style={{fontSize:9,color:"#94A3B8",marginTop:6,textAlign:"center"}}>選択すると開始日・終了日が一括でずれます</div>
              </div>

              {/* 請負予実グラフ */}
              {task.isContract&&task.plannedManDays>0&&(()=>{
                const prog=calcProgress(task,reports,TODAY);
                if(!prog)return null;
                const gapColor=prog.gap>=0?"#16A34A":prog.gap>=-10?"#D97706":"#DC2626";
                return(
                <div style={{background:"#F8FAFC",borderRadius:10,border:"1px solid #E2E8F0",padding:"12px 13px",marginBottom:10}}>
                  <div style={{fontSize:11,fontWeight:700,color:"#475569",marginBottom:10}}>📊 請負工事 予実管理</div>
                  {/* 人工数 */}
                  <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6,marginBottom:10}}>
                    {[{l:"予定人工",v:prog.planned,u:"人工",c:"#3B82F6"},{l:"実績人工",v:prog.actual,u:"人工",c:"#16A34A"},{l:"乖離",v:(prog.gap>=0?"+":"")+prog.gap+"%",u:"",c:gapColor}].map(x=>(
                      <div key={x.l} style={{background:"#fff",borderRadius:8,padding:"8px 5px",textAlign:"center",border:"1px solid #E2E8F0"}}>
                        <div style={{fontSize:9,color:"#94A3B8",marginBottom:2}}>{x.l}</div>
                        <div style={{fontFamily:"'Oswald',sans-serif",fontSize:18,fontWeight:700,color:x.c,lineHeight:1}}>{x.v}<span style={{fontSize:10}}>{x.u}</span></div>
                      </div>
                    ))}
                  </div>
                  {/* 進捗バー */}
                  <div style={{marginBottom:6}}>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#94A3B8",marginBottom:3}}>
                      <span>予定進捗</span><span style={{fontWeight:700,color:"#3B82F6"}}>{prog.plannedPct}%</span>
                    </div>
                    <div style={{height:8,background:"#E2E8F0",borderRadius:4,overflow:"hidden"}}>
                      <div style={{height:"100%",width:`${Math.min(prog.plannedPct,100)}%`,background:"#3B82F6",borderRadius:4}}/>
                    </div>
                  </div>
                  <div style={{marginBottom:4}}>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#94A3B8",marginBottom:3}}>
                      <span>実績進捗</span><span style={{fontWeight:700,color:gapColor}}>{prog.actualPct}%</span>
                    </div>
                    <div style={{height:8,background:"#E2E8F0",borderRadius:4,overflow:"hidden"}}>
                      <div style={{height:"100%",width:`${Math.min(prog.actualPct,100)}%`,background:gapColor,borderRadius:4,transition:"width .5s"}}/>
                    </div>
                  </div>
                  <div style={{textAlign:"center",fontSize:11,fontWeight:700,color:gapColor,marginTop:6,padding:"4px 0",background:`${gapColor}12`,borderRadius:6}}>
                    {prog.gap>=0?`▲ 予定より${prog.gap}%進んでいます`:`▼ 予定より${Math.abs(prog.gap)}%遅れています`}
                  </div>
                  {task.progressNote&&<div style={{fontSize:11,color:"#64748B",marginTop:6,padding:"5px 8px",background:"#FFFBEB",borderRadius:6,border:"1px solid #FDE68A"}}>{task.progressNote}</div>}
                </div>
                );
              })()}

              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>setSheet(null)} style={{flex:1,background:"#F1F5F9",border:"none",borderRadius:10,padding:"12px",color:"#64748B",fontWeight:700,fontSize:14,cursor:"pointer"}}>閉じる</button>
                <button onClick={()=>{setSheet(null);setTimeout(()=>openModal("task","edit",{...task}),50);}} style={{flex:2,background:site.color,border:"none",borderRadius:10,padding:"12px",color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer"}}>✏ 詳細編集</button>
              </div>
            </div>
          </div>
        </div>
      );
    })()}

    {/* ══ ボトムシート：稼働一覧 ══ */}
    {sheet?.type==="avail"&&(()=>{
      const date=sheet.date;
      const list=attOnDay(date);
      return(
        <div onClick={()=>setSheet(null)} style={{position:"fixed",inset:0,background:"rgba(15,23,42,.45)",zIndex:400,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:"16px 16px 0 0",width:"100%",maxWidth:480,maxHeight:"85vh",overflowY:"auto",boxShadow:"0 -8px 30px rgba(0,0,0,.15)"}}>
            <div style={{width:40,height:4,background:"#E2E8F0",borderRadius:2,margin:"12px auto 0"}}/>
            <div style={{padding:"10px 14px 0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{fontSize:15,fontWeight:900,color:"#1E293B"}}>稼働可能作業員 <span style={{fontSize:12,color:"#94A3B8",fontWeight:400}}>— {date.replace(/-/g,"/")} / {list.filter(a=>a.status==="available").length}名</span></div>
              <button onClick={()=>{setSheet(null);openModal("att","add",{workerId:"",workerName:"",company:"",startDate:date,endDate:date,status:"available",note:""}); }}
                style={{background:"#F0FDF4",border:"1px solid #BBF7D0",borderRadius:7,padding:"5px 11px",fontSize:12,color:"#16A34A",fontWeight:700,cursor:"pointer"}}>＋登録</button>
            </div>
            <div style={{padding:"10px 12px 20px"}}>
              {list.length===0?<div style={{textAlign:"center",color:"#CBD5E1",padding:"20px",fontSize:12}}>登録なし</div>
              :list.map(a=>{
                const cfg=STATUS[a.status]||STATUS.available;
                return(
                  <div key={a.id} className="row" onClick={()=>{setSheet(null);setTimeout(()=>openModal("att","edit",{...a}),50);}}
                    style={{display:"flex",alignItems:"center",gap:9,padding:"10px 8px",borderRadius:8,marginBottom:4,background:"#F8FAFC",border:"1px solid #E2E8F0",cursor:"pointer"}}>
                    <div style={{background:cfg.bg,border:`1px solid ${cfg.border}`,borderRadius:5,padding:"3px 8px",fontSize:11,color:cfg.text,fontWeight:700,flexShrink:0,minWidth:44,textAlign:"center"}}>{cfg.label}</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:700,color:"#1E293B"}}>{a.workerName}</div>
                      <div style={{fontSize:10,color:"#94A3B8"}}>{a.company} / {a.startDate}〜{a.endDate}</div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    })()}

    {/* ══ モーダル ══ */}
    {modal&&(
      <div onClick={closeModal} style={{position:"fixed",inset:0,background:"rgba(15,23,42,.45)",zIndex:500,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
        <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:"16px 16px 0 0",width:"100%",maxWidth:480,maxHeight:"92vh",overflowY:"auto",padding:"8px 16px 32px",boxShadow:"0 -8px 30px rgba(0,0,0,.2)"}}>
          <div style={{width:40,height:4,background:"#E2E8F0",borderRadius:2,margin:"8px auto 14px"}}/>

          {/* 工程 */}
          {modal.type==="task"&&<>
            <MTitle>{modal.mode==="add"?"＋ 工程追加":"✏ 工程編集"}</MTitle>
            <MField label="現場"><select value={form.siteId||sites[0]?.id||""} onChange={e=>setForm({...form,siteId:e.target.value})} style={IS}>{sites.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}</select></MField>
            <MField label="工程名"><input type="text" placeholder="例：基礎工事" value={form.name||""} onChange={e=>setForm({...form,name:e.target.value})} style={IS}/></MField>
            <MField label="開始日"><input type="date" value={form.start||""} onChange={e=>setForm({...form,start:e.target.value})} style={IS}/></MField>
            <MField label="終了日"><input type="date" value={form.end||""} onChange={e=>setForm({...form,end:e.target.value})} style={IS}/></MField>
            <MField label="1日あたり予定人数"><input type="number" min={1} value={form.workers||1} onChange={e=>setForm({...form,workers:e.target.value})} style={IS}/></MField>
            <MField label="備考"><input type="text" placeholder="翌日計画など" value={form.memo||""} onChange={e=>setForm({...form,memo:e.target.value})} style={IS}/></MField>
            <MField label="特記事項"><textarea placeholder="注意事項など" value={form.note||""} onChange={e=>setForm({...form,note:e.target.value})} style={{...TA,minHeight:52}}/></MField>

            {/* 請負工事 予実管理設定 */}
            <MField label="請負工事 予実管理">
              <Chk val={!!form.isContract} onChange={()=>setForm({...form,isContract:!form.isContract})} label="この工程は請負工事" sub="ONにすると予実管理が有効になります" color="#8B5CF6"/>
              {form.isContract&&<>
                <div style={{background:"#F5F3FF",border:"1px solid #DDD6FE",borderRadius:9,padding:"10px 12px",marginTop:4}}>
                  <div style={{marginBottom:8}}>
                    <div style={{fontSize:10,color:"#6D28D9",fontWeight:700,marginBottom:4}}>予定人工数（工期全体）</div>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <input type="number" min={1} placeholder="例：80" value={form.plannedManDays||""} onChange={e=>setForm({...form,plannedManDays:+e.target.value})} style={{...IS,flex:1}}/>
                      <span style={{fontSize:13,color:"#6D28D9",flexShrink:0,fontWeight:700}}>人工</span>
                    </div>
                    {form.plannedManDays>0&&form.start&&form.end&&(()=>{
                      const wd=workDays({...form,workers:+form.workers||1});
                      const perDay=Math.round(form.plannedManDays/wd*10)/10;
                      return<div style={{fontSize:10,color:"#7C3AED",marginTop:3}}>（稼働日あたり約{perDay}人工）</div>;
                    })()}
                  </div>
                  <div>
                    <div style={{fontSize:10,color:"#6D28D9",fontWeight:700,marginBottom:4}}>進捗メモ</div>
                    <input type="text" placeholder="例：2工区完了、3工区着手中" value={form.progressNote||""} onChange={e=>setForm({...form,progressNote:e.target.value})} style={IS}/>
                  </div>
                </div>
                {form.isContract&&form.plannedManDays>0&&(()=>{
                  const prog=calcProgress({...form,workers:+form.workers||1},reports,TODAY);
                  if(!prog)return null;
                  const gapColor=prog.gap>=0?"#16A34A":prog.gap>=-10?"#D97706":"#DC2626";
                  return(
                    <div style={{background:"#fff",border:`1px solid ${gapColor}44`,borderRadius:9,padding:"9px 12px",marginTop:6}}>
                      <div style={{fontSize:10,color:"#94A3B8",marginBottom:6}}>現在の予実プレビュー</div>
                      <div style={{display:"flex",gap:8,marginBottom:6}}>
                        {[{l:"予定進捗",v:`${prog.plannedPct}%`,c:"#3B82F6"},{l:"実績進捗",v:`${prog.actualPct}%`,c:gapColor},{l:"乖離",v:`${prog.gap>=0?"+":""}${prog.gap}%`,c:gapColor}].map(x=>(
                          <div key={x.l} style={{flex:1,textAlign:"center"}}>
                            <div style={{fontSize:8,color:"#94A3B8"}}>{x.l}</div>
                            <div style={{fontFamily:"'Oswald',sans-serif",fontSize:16,fontWeight:700,color:x.c}}>{x.v}</div>
                          </div>
                        ))}
                      </div>
                      <div style={{height:6,background:"#E2E8F0",borderRadius:3,overflow:"hidden",marginBottom:4}}>
                        <div style={{height:"100%",width:`${Math.min(prog.plannedPct,100)}%`,background:"#3B82F6",borderRadius:3}}/>
                      </div>
                      <div style={{height:6,background:"#E2E8F0",borderRadius:3,overflow:"hidden"}}>
                        <div style={{height:"100%",width:`${Math.min(prog.actualPct,100)}%`,background:gapColor,borderRadius:3}}/>
                      </div>
                    </div>
                  );
                })()}
              </>}
            </MField>
            <MField label="除外設定">
              <Chk val={!!form.skipWeekend} onChange={()=>setForm({...form,skipWeekend:!form.skipWeekend,skipSunday:false})} label="土日を除く"/>
              <Chk val={!!form.skipSunday&&!form.skipWeekend} onChange={()=>setForm({...form,skipSunday:!form.skipSunday,skipWeekend:false})} label="日曜のみ除く" sub="土曜は稼働"/>
              <Chk val={!!form.skipHoliday} onChange={()=>setForm({...form,skipHoliday:!form.skipHoliday})} label="祝日を除く"/>
              <div style={{background:"#F8FAFC",border:"1px solid #E2E8F0",borderRadius:9,padding:"9px 12px",marginTop:2}}>
                <div style={{fontSize:11,color:"#64748B",fontWeight:700,marginBottom:5}}>特定日を除く</div>
                <input type="date" style={{...IS,marginBottom:5}} onChange={e=>{if(!e.target.value)return;const cur=(form.skipDates||"").split(",").map(s=>s.trim()).filter(Boolean);if(!cur.includes(e.target.value))setForm({...form,skipDates:[...cur,e.target.value].join(",")});e.target.value="";}}/>
                <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                  {(form.skipDates||"").split(",").filter(s=>s.trim()).map(d=>(
                    <div key={d} style={{display:"inline-flex",alignItems:"center",gap:4,background:"#FEE2E2",border:"1px solid #FECACA",borderRadius:5,padding:"2px 7px"}}>
                      <span style={{fontSize:11,color:"#DC2626"}}>{d.trim()}</span>
                      <span onClick={()=>setForm({...form,skipDates:(form.skipDates||"").split(",").map(s=>s.trim()).filter(s=>s&&s!==d.trim()).join(",")})} style={{color:"#DC2626",cursor:"pointer",fontWeight:900,fontSize:14,lineHeight:1}}>×</span>
                    </div>
                  ))}
                </div>
              </div>
            </MField>
            {form.start&&form.end&&(()=>{const t={...form,workers:+form.workers||1};const total=drange(parseD(form.start),parseD(form.end)).length;const wd=workDays(t);return(<div style={{background:"#EEF2FF",border:"1px solid #C7D2FE",borderRadius:9,padding:"9px 12px",marginBottom:10,display:"flex",gap:14,alignItems:"center"}}><div style={{textAlign:"center"}}><div style={{fontSize:9,color:"#64748B"}}>期間</div><div style={{fontFamily:"'Oswald',sans-serif",fontSize:17,color:"#64748B"}}>{total}日</div></div><span style={{color:"#94A3B8",fontSize:14}}>→</span><div style={{textAlign:"center"}}><div style={{fontSize:9,color:"#64748B"}}>稼働</div><div style={{fontFamily:"'Oswald',sans-serif",fontSize:17,color:"#4F46E5",fontWeight:700}}>{wd}日</div></div><div style={{textAlign:"center"}}><div style={{fontSize:9,color:"#64748B"}}>人工</div><div style={{fontFamily:"'Oswald',sans-serif",fontSize:17,color:"#F97316",fontWeight:700}}>{wd*(+form.workers||1)}</div></div></div>);})()}
            <MBtns onClose={closeModal} onSave={saveTask} onDelete={modal.mode==="edit"?()=>delTask(form.id):null}/>
          </>}

          {/* 稼働登録（期間対応） */}
          {modal.type==="att"&&<>
            <MTitle c="#16A34A">{modal.mode==="add"?"＋ 稼働登録":"✏ 稼働編集"}</MTitle>
            {workerMaster.length>0&&modal.mode==="add"&&(
              <MField label="マスタから選択">
                <select onChange={e=>{const w=workerMaster.find(w=>w.id===e.target.value);if(w)setForm({...form,workerId:w.id,workerName:w.name,company:w.company});}} style={IS}>
                  <option value="">-- 作業員を選択 --</option>
                  {workerMaster.map(w=><option key={w.id} value={w.id}>{w.name}（{w.company}）</option>)}
                </select>
              </MField>
            )}
            <MField label="氏名"><input type="text" placeholder="例：田中 太郎" value={form.workerName||""} onChange={e=>setForm({...form,workerName:e.target.value})} style={IS}/></MField>
            <MField label="会社名"><input type="text" placeholder="例：山田建設" value={form.company||""} onChange={e=>setForm({...form,company:e.target.value})} style={IS}/></MField>
            <MField label="開始日（期間登録可）"><input type="date" value={form.startDate||""} onChange={e=>setForm({...form,startDate:e.target.value})} style={IS}/></MField>
            <MField label="終了日（1日だけなら開始日と同じ）"><input type="date" value={form.endDate||form.startDate||""} onChange={e=>setForm({...form,endDate:e.target.value})} style={IS}/></MField>
            <MField label="ステータス">
              <div style={{display:"flex",gap:7}}>
                {Object.entries(STATUS).map(([k,v])=>(
                  <div key={k} onClick={()=>setForm({...form,status:k})}
                    style={{flex:1,background:form.status===k?v.bg:"#F8FAFC",border:`2px solid ${form.status===k?v.border:"#E2E8F0"}`,borderRadius:9,padding:"10px 4px",textAlign:"center",cursor:"pointer"}}>
                    <div style={{fontSize:14,fontWeight:700,color:form.status===k?v.text:"#94A3B8"}}>{v.label}</div>
                  </div>
                ))}
              </div>
            </MField>
            <MField label="除外設定（期間中でも休む日）">
              <Chk val={!!form.skipWeekend} onChange={()=>setForm({...form,skipWeekend:!form.skipWeekend,skipSunday:false})} label="土日を除く"/>
              <Chk val={!!form.skipSunday&&!form.skipWeekend} onChange={()=>setForm({...form,skipSunday:!form.skipSunday,skipWeekend:false})} label="日曜のみ除く"/>
              <Chk val={!!form.skipHoliday} onChange={()=>setForm({...form,skipHoliday:!form.skipHoliday})} label="祝日を除く"/>
            </MField>
            <MField label="備考"><input type="text" placeholder="例：有給理由など" value={form.note||""} onChange={e=>setForm({...form,note:e.target.value})} style={IS}/></MField>
            <MBtns onClose={closeModal} onSave={saveAtt} onDelete={modal.mode==="edit"?()=>delAtt(form.id):null} saveColor="#16A34A"/>
          </>}

          {/* 日報 */}
          {modal.type==="report"&&<>
            <MTitle c="#4F46E5">{modal.mode==="add"?"📝 日報作成":"📝 日報編集"}</MTitle>
            <MField label="現場">
              <select value={form.siteId||sites[0]?.id||""} onChange={e=>{
                const s=sites.find(x=>x.id===e.target.value);
                const cl=s?clients.find(c=>c.id===s.clientId):null;
                setForm({...form,siteId:e.target.value,clientName:cl?.name||form.clientName||""});
              }} style={IS}>{sites.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}</select>
            </MField>
            <MField label="元請会社名">
              <select value={form.clientName||""} onChange={e=>setForm({...form,clientName:e.target.value})} style={{...IS,marginBottom:5}}>
                <option value="">-- マスタから選択 --</option>
                {clients.map(c=><option key={c.id} value={c.name}>{c.name}</option>)}
              </select>
              <input type="text" placeholder="または直接入力" value={form.clientName||""} onChange={e=>setForm({...form,clientName:e.target.value})} style={{...IS,fontSize:13}}/>
            </MField>
            <MField label="日付"><input type="date" value={form.date||""} onChange={e=>setForm({...form,date:e.target.value})} style={IS}/></MField>
            <MField label="天気"><select value={form.weather||"晴れ"} onChange={e=>setForm({...form,weather:e.target.value})} style={IS}>{WEATHERS.map(w=><option key={w} value={w}>{w}</option>)}</select></MField>

            {/* 工事種別（常用/請負 複数） */}
            <MField label="工事種別（＋常用工事 / ＋請負工事 で追加）">
              {(form.jobTypes||[]).map((jt,ji)=>(
                <div key={ji} style={{background:"#F8FAFC",border:"1px solid #E2E8F0",borderRadius:10,padding:"10px 11px",marginBottom:8}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                    <div style={{display:"flex",gap:6}}>
                      {["常用","請負"].map(t=>(
                        <button key={t} onClick={()=>{const jts=[...(form.jobTypes||[])];jts[ji]={...jts[ji],type:t};setForm({...form,jobTypes:jts});}}
                          style={{background:jt.type===t?(t==="常用"?"#EFF6FF":"#F0FDF4"):"#fff",border:`1.5px solid ${jt.type===t?(t==="常用"?"#3B82F6":"#16A34A"):"#E2E8F0"}`,borderRadius:7,padding:"5px 14px",fontSize:13,fontWeight:700,color:jt.type===t?(t==="常用"?"#2563EB":"#16A34A"):"#94A3B8",cursor:"pointer"}}>{t}工事</button>
                      ))}
                    </div>
                    <button onClick={()=>setForm({...form,jobTypes:(form.jobTypes||[]).filter((_,j)=>j!==ji)})} style={{background:"#FEE2E2",border:"none",borderRadius:6,padding:"4px 9px",fontSize:11,color:"#DC2626",cursor:"pointer"}}>削除</button>
                  </div>
                  <div style={{marginBottom:6}}>
                    <div style={{fontSize:10,color:"#64748B",fontWeight:700,marginBottom:4}}>作業員</div>
                    {(jt.workers||[]).map((w,wi)=>(
                      <div key={wi} style={{display:"flex",gap:5,marginBottom:5,alignItems:"center"}}>
                        <select onChange={e=>{const wm=workerMaster.find(x=>x.id===e.target.value);if(wm){const jts=[...(form.jobTypes||[])];const ws=[...(jts[ji].workers||[])];ws[wi]={name:wm.name,company:wm.company};jts[ji]={...jts[ji],workers:ws};setForm({...form,jobTypes:jts});}e.target.value="";}} style={{...IS,flex:1,padding:"7px 10px",fontSize:12}}>
                          <option value="">マスタから...</option>
                          {workerMaster.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}
                        </select>
                        <input type="text" placeholder="会社" value={w.company||""} onChange={e=>{const jts=[...(form.jobTypes||[])];const ws=[...(jts[ji].workers||[])];ws[wi]={...ws[wi],company:e.target.value};jts[ji]={...jts[ji],workers:ws};setForm({...form,jobTypes:jts});}} style={{...IS,flex:1,padding:"7px 10px",fontSize:12}}/>
                        <input type="text" placeholder="氏名" value={w.name||""} onChange={e=>{const jts=[...(form.jobTypes||[])];const ws=[...(jts[ji].workers||[])];ws[wi]={...ws[wi],name:e.target.value};jts[ji]={...jts[ji],workers:ws};setForm({...form,jobTypes:jts});}} style={{...IS,flex:1,padding:"7px 10px",fontSize:12}}/>
                        <button onClick={()=>{const jts=[...(form.jobTypes||[])];jts[ji]={...jts[ji],workers:jts[ji].workers.filter((_,j)=>j!==wi)};setForm({...form,jobTypes:jts});}} style={{background:"#FEE2E2",border:"none",borderRadius:6,width:30,height:40,color:"#DC2626",fontSize:14,cursor:"pointer",flexShrink:0}}>×</button>
                      </div>
                    ))}
                    <button onClick={()=>{const jts=[...(form.jobTypes||[])];jts[ji]={...jts[ji],workers:[...(jts[ji].workers||[]),{name:"",company:""}]};setForm({...form,jobTypes:jts});}} style={{background:"#F0FDF4",border:"1px dashed #BBF7D0",borderRadius:7,padding:"6px",fontSize:11,color:"#16A34A",fontWeight:700,cursor:"pointer",width:"100%",marginBottom:6}}>＋ 作業員追加</button>
                  </div>
                  <div style={{marginBottom:6}}>
                    <div style={{fontSize:10,color:"#64748B",fontWeight:700,marginBottom:4}}>作業内容</div>
                    <textarea value={jt.work||""} onChange={e=>{const jts=[...(form.jobTypes||[])];jts[ji]={...jts[ji],work:e.target.value};setForm({...form,jobTypes:jts});}} style={{...TA,minHeight:48}}/>
                  </div>
                  <Chk val={!!jt.overtime} onChange={()=>{const jts=[...(form.jobTypes||[])];jts[ji]={...jts[ji],overtime:!jts[ji].overtime};setForm({...form,jobTypes:jts});}} label="残業あり" color="#D97706"/>
                  {jt.overtime&&<>
                    {(jt.overtimeDetails||[]).map((o,oi)=>(
                      <div key={oi} style={{display:"flex",gap:5,marginBottom:5,alignItems:"center"}}>
                        <input type="text" placeholder="作業員名" value={o.name||""} onChange={e=>{const jts=[...(form.jobTypes||[])];const od=[...(jts[ji].overtimeDetails||[])];od[oi]={...od[oi],name:e.target.value};jts[ji]={...jts[ji],overtimeDetails:od};setForm({...form,jobTypes:jts});}} style={{...IS,flex:1}}/>
                        <input type="number" min={0} placeholder="h" value={o.hours||""} onChange={e=>{const jts=[...(form.jobTypes||[])];const od=[...(jts[ji].overtimeDetails||[])];od[oi]={...od[oi],hours:+e.target.value};jts[ji]={...jts[ji],overtimeDetails:od};setForm({...form,jobTypes:jts});}} style={{...IS,width:64}}/>
                        <span style={{fontSize:12,color:"#64748B"}}>h</span>
                        <button onClick={()=>{const jts=[...(form.jobTypes||[])];jts[ji]={...jts[ji],overtimeDetails:jts[ji].overtimeDetails.filter((_,j)=>j!==oi)};setForm({...form,jobTypes:jts});}} style={{background:"#FEE2E2",border:"none",borderRadius:6,width:30,height:44,color:"#DC2626",fontSize:14,cursor:"pointer",flexShrink:0}}>×</button>
                      </div>
                    ))}
                    <button onClick={()=>{const jts=[...(form.jobTypes||[])];jts[ji]={...jts[ji],overtimeDetails:[...(jts[ji].overtimeDetails||[]),{name:"",hours:0}]};setForm({...form,jobTypes:jts});}} style={{width:"100%",background:"#FFFBEB",border:"1px dashed #FDE047",borderRadius:7,padding:"6px",fontSize:11,color:"#B45309",fontWeight:700,cursor:"pointer"}}>＋ 残業者追加</button>
                  </>}
                </div>
              ))}
              <div style={{display:"flex",gap:6}}>
                {["常用","請負"].map(t=>(
                  <button key={t} onClick={()=>setForm({...form,jobTypes:[...(form.jobTypes||[]),{type:t,workers:[],work:"",overtime:false,overtimeDetails:[]}]})}
                    style={{flex:1,background:t==="常用"?"#EFF6FF":"#F0FDF4",border:`1px dashed ${t==="常用"?"#BFDBFE":"#BBF7D0"}`,borderRadius:8,padding:"9px",fontSize:12,fontWeight:700,color:t==="常用"?"#2563EB":"#16A34A",cursor:"pointer"}}>
                    ＋ {t}工事を追加
                  </button>
                ))}
              </div>
            </MField>

            <MField label="搬出入車両">
              {(form.vehicles||[]).map((v,i)=>(
                <div key={i} style={{background:"#F8FAFC",border:"1px solid #E2E8F0",borderRadius:9,padding:"9px 10px",marginBottom:6}}>
                  <div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center",marginBottom:6}}>
                    {["搬入","搬出","搬出入"].map(t=>(
                      <button key={t} onClick={()=>{const vs=[...(form.vehicles||[])];vs[i]={...vs[i],direction:t};setForm({...form,vehicles:vs});}}
                        style={{background:v.direction===t?"#EEF2FF":"#fff",border:`1.5px solid ${v.direction===t?"#6366F1":"#E2E8F0"}`,borderRadius:6,padding:"4px 10px",fontSize:12,fontWeight:700,color:v.direction===t?"#4F46E5":"#94A3B8",cursor:"pointer"}}>{t}</button>
                    ))}
                    <span style={{fontSize:11,color:"#E2E8F0"}}>|</span>
                    {["常用","請負"].map(t=>(
                      <button key={t} onClick={()=>{const vs=[...(form.vehicles||[])];vs[i]={...vs[i],contractType:t};setForm({...form,vehicles:vs});}}
                        style={{background:v.contractType===t?(t==="常用"?"#EFF6FF":"#F0FDF4"):"#fff",border:`1.5px solid ${v.contractType===t?(t==="常用"?"#3B82F6":"#16A34A"):"#E2E8F0"}`,borderRadius:6,padding:"4px 10px",fontSize:12,fontWeight:700,color:v.contractType===t?(t==="常用"?"#2563EB":"#16A34A"):"#94A3B8",cursor:"pointer"}}>{t}</button>
                    ))}
                    <button onClick={()=>setForm({...form,vehicles:(form.vehicles||[]).filter((_,j)=>j!==i)})} style={{marginLeft:"auto",background:"#FEE2E2",border:"none",borderRadius:6,padding:"4px 9px",fontSize:11,color:"#DC2626",cursor:"pointer"}}>削除</button>
                  </div>
                  <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                    {["2t","3t","4t","6t","7t","8t","10t"].map(s=>(
                      <button key={s} onClick={()=>{const vs=[...(form.vehicles||[])];vs[i]={...vs[i],size:s};setForm({...form,vehicles:vs});}}
                        style={{background:v.size===s?"#1E293B":"#F8FAFC",border:`1.5px solid ${v.size===s?"#1E293B":"#E2E8F0"}`,borderRadius:6,padding:"5px 10px",fontSize:12,fontWeight:700,color:v.size===s?"#fff":"#64748B",cursor:"pointer"}}>{s}</button>
                    ))}
                  </div>
                </div>
              ))}
              <button onClick={()=>setForm({...form,vehicles:[...(form.vehicles||[]),{direction:"搬入",contractType:"常用",size:"2t"}]})} style={{width:"100%",background:"#F8FAFC",border:"1px dashed #CBD5E1",borderRadius:8,padding:"9px",fontSize:12,color:"#64748B",fontWeight:700,cursor:"pointer"}}>＋ 車両を追加</button>
            </MField>

            <MField label="高速乗降口"><input type="text" value={form.highway||""} onChange={e=>setForm({...form,highway:e.target.value})} style={IS}/></MField>
            <MField label="パーキング">
              <Chk val={!!form.parking} onChange={()=>setForm({...form,parking:!form.parking})} label="使用あり"/>
              {form.parking&&<input type="number" min={0} placeholder="料金（円）" value={form.parkingFee||""} onChange={e=>setForm({...form,parkingFee:+e.target.value})} style={{...IS,marginTop:5}}/>}
            </MField>
            <MField label="ガソリン（円）"><input type="number" min={0} value={form.gas||""} onChange={e=>setForm({...form,gas:+e.target.value})} style={IS}/></MField>
            <MField label="その他経費"><input type="text" value={form.otherExpense||""} onChange={e=>setForm({...form,otherExpense:e.target.value})} style={IS}/></MField>
            <MField label="当欠者">
              {(form.absentees||[]).map((a,i)=>(
                <div key={i} style={{display:"flex",gap:6,marginBottom:5,alignItems:"center"}}>
                  <input type="text" placeholder="作業員名" value={a.name||""} onChange={e=>{const ab=[...(form.absentees||[])];ab[i]={name:e.target.value};setForm({...form,absentees:ab});}} style={{...IS,flex:1}}/>
                  <button onClick={()=>setForm({...form,absentees:(form.absentees||[]).filter((_,j)=>j!==i)})} style={{background:"#FEE2E2",border:"none",borderRadius:6,width:32,height:44,color:"#DC2626",fontSize:14,cursor:"pointer",flexShrink:0}}>×</button>
                </div>
              ))}
              <button onClick={()=>setForm({...form,absentees:[...(form.absentees||[]),{name:""}]})} style={{width:"100%",background:"#FEF2F2",border:"1px dashed #FECACA",borderRadius:8,padding:"8px",fontSize:12,color:"#DC2626",fontWeight:700,cursor:"pointer"}}>＋ 当欠者追加</button>
            </MField>
            <MField label="遅刻">
              {(form.latecomers||[]).map((l,i)=>(
                <div key={i} style={{display:"flex",gap:6,marginBottom:5,alignItems:"center"}}>
                  <input type="text" placeholder="作業員名" value={l.name||""} onChange={e=>{const lc=[...(form.latecomers||[])];lc[i]={name:e.target.value};setForm({...form,latecomers:lc});}} style={{...IS,flex:1}}/>
                  <button onClick={()=>setForm({...form,latecomers:(form.latecomers||[]).filter((_,j)=>j!==i)})} style={{background:"#FEE2E2",border:"none",borderRadius:6,width:32,height:44,color:"#DC2626",fontSize:14,cursor:"pointer",flexShrink:0}}>×</button>
                </div>
              ))}
              <button onClick={()=>setForm({...form,latecomers:[...(form.latecomers||[]),{name:""}]})} style={{width:"100%",background:"#FFFBEB",border:"1px dashed #FDE68A",borderRadius:8,padding:"8px",fontSize:12,color:"#B45309",fontWeight:700,cursor:"pointer"}}>＋ 遅刻者を追加</button>
            </MField>
            <MField label="安全確認">
              <div onClick={()=>setForm({...form,safety:!form.safety})} style={{display:"flex",alignItems:"center",gap:12,background:form.safety?"#F0FDF4":"#F8FAFC",border:`2px solid ${form.safety?"#86EFAC":"#E2E8F0"}`,borderRadius:10,padding:"12px 14px",cursor:"pointer"}}>
                <div style={{width:22,height:22,borderRadius:5,border:`2px solid ${form.safety?"#16A34A":"#CBD5E1"}`,background:form.safety?"#16A34A":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  {form.safety&&<span style={{color:"#fff",fontSize:14,fontWeight:900}}>✓</span>}
                </div>
                <span style={{fontSize:14,fontWeight:700,color:form.safety?"#16A34A":"#94A3B8"}}>安全確認 完了</span>
              </div>
            </MField>
            <MField label="インシデント・特記事項"><textarea value={form.incident||""} onChange={e=>setForm({...form,incident:e.target.value})} style={{...TA,minHeight:52}}/></MField>
            <MField label="提出者"><input type="text" value={form.by||""} onChange={e=>setForm({...form,by:e.target.value})} style={IS}/></MField>
            <MBtns onClose={closeModal} onSave={()=>saveReport(admin.isAdmin)} onDelete={modal.mode==="edit"?()=>delReport(form.id,admin.isAdmin):null} saveColor="#4F46E5" saveLabel={modal.mode==="add"?"提出":"保存"}/>
          </>}

          {/* 元請会社 */}
          {modal.type==="client"&&<>
            <MTitle>{modal.mode==="add"?"＋ 元請会社追加":"✏ 元請会社編集"}</MTitle>
            <MField label="会社名"><input type="text" value={form.name||""} onChange={e=>setForm({...form,name:e.target.value})} style={IS}/></MField>
            <MBtns onClose={closeModal} onSave={saveClient} saveColor="#3B82F6"/>
          </>}

          {/* 現場 */}
          {modal.type==="site"&&<>
            <MTitle>{modal.mode==="add"?"＋ 現場追加":"✏ 現場編集"}</MTitle>
            <MField label="元請け会社"><select value={form.clientId||clients[0]?.id||""} onChange={e=>setForm({...form,clientId:e.target.value})} style={IS}>{clients.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</select></MField>
            <MField label="現場名"><input type="text" value={form.name||""} onChange={e=>setForm({...form,name:e.target.value})} style={IS}/></MField>
            <MField label="上限人数"><input type="number" min={1} value={form.capacity||4} onChange={e=>setForm({...form,capacity:e.target.value})} style={IS}/></MField>
            <MField label="カラー"><div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{COLORS.map(c=><div key={c} onClick={()=>setForm({...form,color:c})} style={{width:30,height:30,borderRadius:7,background:c,cursor:"pointer",border:form.color===c?"3px solid #1E293B":"3px solid transparent"}}/>)}</div></MField>
            <MBtns onClose={closeModal} onSave={saveSite} saveColor="#F97316"/>
          </>}

          {/* 作業員マスタ */}
          {modal.type==="workerM"&&<>
            <MTitle c="#16A34A">{modal.mode==="add"?"＋ 作業員登録":"✏ 作業員編集"}</MTitle>
            <MField label="氏名"><input type="text" value={form.name||""} onChange={e=>setForm({...form,name:e.target.value})} style={IS}/></MField>
            <MField label="所属会社"><input type="text" value={form.company||""} onChange={e=>setForm({...form,company:e.target.value})} style={IS}/></MField>
            <MField label="備考"><input type="text" value={form.note||""} onChange={e=>setForm({...form,note:e.target.value})} style={IS}/></MField>
            <MBtns onClose={closeModal} onSave={saveWM} onDelete={modal.mode==="edit"?()=>{set("workerMaster",workerMaster.filter(w=>w.id!==form.id));closeModal();}:null} saveColor="#16A34A"/>
          </>}

        </div>
      </div>
    )}

    {/* パスワードモーダル */}
    {pwModal&&<PWModal title={pwModal.title} onSuccess={()=>{admin.login(admin.getStoredPW()||"1234");pwModal.onSuccess();}} onClose={()=>setPWModal(null)}/>}

  </div>
  );
}

// パスワード変更フォーム
function PWChangeForm({onSave}){
  const[oldPW,setOld]=useState("");
  const[newPW,setNew]=useState("");
  return(
    <div>
      <div style={{fontSize:11,color:"#64748B",marginBottom:8}}>パスワードを変更する（現在のパスワードが必要です）</div>
      <input type="password" placeholder="現在のパスワード（4桁）" maxLength={4} value={oldPW} onChange={e=>setOld(e.target.value)} style={{...IS,marginBottom:8}}/>
      <input type="password" placeholder="新しいパスワード（4桁）" maxLength={4} value={newPW} onChange={e=>setNew(e.target.value)} style={{...IS,marginBottom:8}}/>
      <button onClick={()=>{if(oldPW.length===4&&newPW.length===4){onSave(oldPW,newPW);setOld("");setNew("");}}} style={{width:"100%",background:"#4F46E5",border:"none",borderRadius:8,padding:"10px",fontSize:13,color:"#fff",fontWeight:700,cursor:"pointer"}}>パスワードを変更</button>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
