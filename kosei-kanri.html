// ─── Utils ───────────────────────────────────────
function isWorkDay(ds,task){
  if(!task)return true;
  const d=parseD(ds),dow=d.getDay();
  if(task.skipWeekend&&(dow===0||dow===6))return false;
  if(task.skipSunday&&dow===0)return false;
  if(task.skipHoliday&&HOLIDAYS.has(ds))return false;
  if(task.skipDates){const sk=task.skipDates.split(",").map(s=>s.trim()).filter(Boolean);if(sk.includes(ds))return false;}
  return true;
}
function workDays(task){
  if(!task||!task.start||!task.end)return 0;
  let c=new Date(task.start+"T00:00:00"),e=new Date(task.end+"T00:00:00"),n=0;
  while(c<=e){if(isWorkDay(fmtD(c),task))n++;c.setDate(c.getDate()+1);}
  return n;
}
// 請負予実計算
function calcProgress(task, reports, today){
  if(!task.isContract||!task.plannedManDays)return null;
  const todayStr=fmtD(today);
  // 実績人工：日報の請負工事から集計
  let actual=0;
  reports.forEach(r=>{
    if(r.siteId!==task.siteId)return;
    if(r.date<task.start||r.date>task.end)return;
    (r.jobTypes||[]).forEach(jt=>{
      if(jt.type==="請負")actual+=(jt.workers||[]).length;
    });
  });
  // 予定進捗率：今日時点での経過稼働日数÷全稼働日数
  const totalWD=workDays(task);
  if(!totalWD)return null;
  let elapsedWD=0;
  const s=parseD(task.start),t2=parseD(Math.min(parseD(todayStr),parseD(task.end)));
  let cur=new Date(s);
  while(cur<=t2){if(isWorkDay(fmtD(cur),task))elapsedWD++;cur.setDate(cur.getDate()+1);}
  const plannedPct=Math.round(elapsedWD/totalWD*100);
  const actualPct=Math.round(actual/task.plannedManDays*100);
  const gap=actualPct-plannedPct; // プラスが進んでいる
  return{actual,planned:task.plannedManDays,totalWD,elapsedWD,plannedPct,actualPct,gap};
}

// ─── 日付の種別 ──────────────────────────────────
function dayType(ds){
  const d=parseD(ds),dow=d.getDay();
  if(HOLIDAYS.has(ds))return"holiday";
  if(dow===0)return"sun";
  if(dow===6)return"sat";
  return"weekday";
}
function dayColor(ds,isToday,isSel){
  if(isSel)return"#fff";
  if(isToday)return"#FCD34D";
  const t=dayType(ds);
  if(t==="holiday")return"#F0ABFC";
  if(t==="sun")return"#F87171";
  if(t==="sat")return"#93C5FD";
  return"#CBD5E1";
}
function dayBg(ds,isToday,isSel){
  if(isSel)return"#F97316";
  if(isToday)return"rgba(249,115,22,.25)";
  const t=dayType(ds);
  if(t==="holiday")return"rgba(192,38,211,.08)";
  if(t==="sun")return"rgba(239,68,68,.06)";
  if(t==="sat")return"rgba(59,130,246,.06)";
  return"#1E293B";
}

// ─── ストア ───────────────────────────────────────
const LS="kms_v2";
const LS_TS="kms_v2_ts";

function useStore(){
  const load=()=>{
    try{const s=localStorage.getItem(LS);if(s){const d=JSON.parse(s);if(d&&Object.keys(d).length)return d;}}catch(_){}
    try{localStorage.setItem(LS,JSON.stringify(SEED));}catch(_){}
    return SEED;
  };
  const[store,_set]=useState(load);
  const[syncing,setSyncing]=useState(false);
  const[syncErr,setSyncErr]=useState(null);
  const[lastSync,setLastSync]=useState(null);
  const[synced,setSynced]=useState(false);

  // ユーザーが変更したときだけLS_TSを更新
  const saveLocalUser=useCallback((next)=>{
    try{
      localStorage.setItem(LS,JSON.stringify(next));
      localStorage.setItem(LS_TS,Date.now().toString());
    }catch(_){}
  },[]);

  // GASデータ適用時はLS_TSを更新しない（ユーザー変更ではないため）
  const saveLocalGAS=useCallback((next)=>{
    try{localStorage.setItem(LS,JSON.stringify(next));}catch(_){}
  },[]);

  // ユーザー操作からのsetStore（LS_TS更新あり）
  const setStore=useCallback(fn=>{
    _set(prev=>{const next=typeof fn==="function"?fn(prev):fn;saveLocalUser(next);return next;});
  },[saveLocalUser]);

  // GASへ全データ送信
  const syncUp=useCallback(async(data)=>{
    if(!gasOK())return;
    const ts=parseInt(localStorage.getItem(LS_TS)||"0");
    try{
      await gasPost("saveAll",{...data,_ts:ts});
      setLastSync(nowStr());setSyncErr(null);setSynced(true);
    }catch(e){setSyncErr("送信失敗: "+e.message);}
  },[]);

  // GASデータをローカルに適用（LS_TS更新なし）
  const applyGAS=useCallback((d)=>{
    const upd={};
    ["clients","sites","tasks","workerMaster","attendance","reports"].forEach(k=>{
      if(Array.isArray(d[k]))upd[k]=d[k];
    });
    _set(p=>{const next={...p,...upd};saveLocalGAS(next);return next;});
    setLastSync(nowStr());setSynced(true);setSyncErr(null);
  },[saveLocalGAS]);

  // 手動pull（強制取得ボタン用）
  const pull=useCallback(async()=>{
    if(!gasOK())return;
    setSyncing(true);setSyncErr(null);
    try{
      const d=await gasGet("getAll");
      if(d&&Object.values(d).some(v=>Array.isArray(v)&&v.length>0))applyGAS(d);
    }catch(e){setSyncErr("取得失敗: "+e.message);}
    finally{setSyncing(false);}
  },[applyGAS]);

  const pushAll=syncUp;

  // 起動時：タイムスタンプ比較
  useEffect(()=>{
    if(!gasOK())return;
    (async()=>{
      setSyncing(true);
      try{
        const d=await gasGet("getAll");
        const gasHasData=d&&Object.values(d).some(v=>Array.isArray(v)&&v.length>0);
        const localTS=parseInt(localStorage.getItem(LS_TS)||"0");
        const gasTS=parseInt(d?._ts||"0");

        if(!gasHasData){
          // GASが空 → ローカルをGASへ送信
          const snap=JSON.parse(localStorage.getItem(LS)||"{}");
          if(Object.values(snap).some(v=>Array.isArray(v)&&v.length>0)){
            await gasPost("saveAll",{...snap,_ts:localTS||Date.now()});
            setLastSync(nowStr());setSynced(true);
          }
        } else if(gasTS>=localTS){
          // GASが新しいかTS同等 → GASを適用（LS_TS更新なし）
          applyGAS(d);
        } else {
          // ローカルが新しい → GASへ送信
          const snap=JSON.parse(localStorage.getItem(LS)||"{}");
          await gasPost("saveAll",{...snap,_ts:localTS});
          setLastSync(nowStr());setSynced(true);
        }
      }catch(e){setSyncErr("起動時同期失敗: "+e.message);}
      finally{setSyncing(false);}
    })();
  },[]);

  // 30秒ごと・タブ復帰時：GASが新しければ適用
  const pollGAS=useCallback(async()=>{
    if(!gasOK()||document.hidden)return;
    try{
      const d=await gasGet("getAll");
      if(!d||!Object.values(d).some(v=>Array.isArray(v)&&v.length>0))return;
      const localTS=parseInt(localStorage.getItem(LS_TS)||"0");
      const gasTS=parseInt(d?._ts||"0");
      if(gasTS>localTS)applyGAS(d); // GASが新しければ適用（LS_TS更新なし）
    }catch(_){}
  },[applyGAS]);

  useEffect(()=>{
    if(!gasOK())return;
    const id=setInterval(pollGAS,30000);
    return()=>clearInterval(id);
  },[pollGAS]);

  useEffect(()=>{
    if(!gasOK())return;
    document.addEventListener("visibilitychange",pollGAS);
    return()=>document.removeEventListener("visibilitychange",pollGAS);
  },[pollGAS]);

  const get=k=>store[k]||[];
  const set=(k,v)=>{
    setStore(prev=>{       // ← saveLocalUser経由でLS_TSを更新
      const next={...prev,[k]:v};
      syncUp(next);        // 全量GAS送信
      return next;
    });
  };
  return{get,set,store,pull,pushAll,syncing,syncErr,synced,lastSync,setStore};
}
// ─── 管理者パスワード ─────────────────────────────
function useAdmin(){
  const[isAdmin,setIsAdmin]=useState(false);
  const getStoredPW=()=>localStorage.getItem(ADMIN_PW_KEY)||"1234";
  const login=(pw)=>{if(pw===getStoredPW()){setIsAdmin(true);return true;}return false;};
  const logout=()=>setIsAdmin(false);
  const changePW=(oldPW,newPW)=>{if(oldPW!==getStoredPW())return false;localStorage.setItem(ADMIN_PW_KEY,newPW);return true;};
  return{isAdmin,login,logout,changePW,getStoredPW};
}

// ─── 同期診断パネル ───────────────────────────────
function SyncPanel({store,pull,pushAll,syncing,syncErr,lastSync,synced}){
  const[log,setLog]=useState([]);
  const[testing,setTesting]=useState(false);
  const addLog=(msg,type="info")=>setLog(l=>[{msg,type,ts:nowStr()},...l].slice(0,12));

  const doTest=async()=>{
    setTesting(true);setLog([]);
    addLog("🔍 GAS接続テスト開始...","info");
    try{
      // 1. GASからデータ取得
      addLog("① GASからデータ取得中...","info");
      const d=await gasGet("getAll");
      const keys=Object.keys(d||{});
      if(!keys.length){addLog("⚠ GASにデータなし（AppDataシートが空）","warn");}
      else{
        keys.forEach(k=>{
          const v=d[k];
          addLog(`  ${k}: ${Array.isArray(v)?v.length+"件":"存在"}`,Array.isArray(v)&&v.length>0?"ok":"warn");
        });
        // 完工現場チェック
        const completedSites=(d.sites||[]).filter(s=>s.completed);
        addLog(`  完工現場: ${completedSites.length}件 ${completedSites.map(s=>s.name).join(", ")}`,completedSites.length>0?"ok":"warn");
      }
      addLog("② GAS接続OK ✅","ok");

      // 2. ローカルデータ確認
      addLog("③ ローカルデータ確認...","info");
      const local=JSON.parse(localStorage.getItem(LS)||"{}");
      const localCompleted=(local.sites||[]).filter(s=>s.completed);
      addLog(`  ローカル完工現場: ${localCompleted.length}件`,localCompleted.length>0?"ok":"warn");
      addLog(`  ローカル現場数: ${(local.sites||[]).length}件`,"info");

      // 3. 差異チェック
      const gasCompleted=(d.sites||[]).filter(s=>s.completed).length;
      if(localCompleted.length!==gasCompleted){
        addLog(`⚠ 差異あり: ローカル${localCompleted.length}件 vs GAS${gasCompleted}件 → 送信推奨`,"warn");
      } else {
        addLog("✅ ローカルとGASのデータが一致","ok");
      }
    }catch(e){
      addLog("✗ GAS接続エラー: "+e.message,"error");
      addLog("→ GASの再デプロイが必要な可能性があります","warn");
    }
    setTesting(false);
  };

  const doForcePush=async()=>{
    addLog("📤 強制送信開始...","info");
    const snap=JSON.parse(localStorage.getItem(LS)||"{}");
    try{
      await gasPost("saveAll",snap);
      addLog("✅ 送信完了！他端末でページを更新してください","ok");
      localStorage.setItem(LS_TS,Date.now().toString());
    }catch(e){addLog("✗ 送信失敗: "+e.message,"error");}
  };

  const doForcePull=async()=>{
    addLog("📥 強制取得開始...","info");
    try{
      const d=await gasGet("getAll");
      const hasData=d&&Object.values(d).some(v=>Array.isArray(v)&&v.length>0);
      if(hasData){
        const next={};
        ["clients","sites","tasks","workerMaster","attendance","reports"].forEach(k=>{
          if(Array.isArray(d[k]))next[k]=d[k];
        });
        // localStorageを直接更新してリロード
        const current=JSON.parse(localStorage.getItem(LS)||"{}");
        localStorage.setItem(LS,JSON.stringify({...current,...next}));
        localStorage.setItem(LS_TS,Date.now().toString());
        addLog("✅ 取得完了！ページをリロードします...","ok");
        setTimeout(()=>window.location.reload(),1000);
      } else {
        addLog("⚠ GASにデータがありません。先に📤送信してください","warn");
      }
    }catch(e){addLog("✗ 取得失敗: "+e.message,"error");}
  };

  const logColors={ok:"#16A34A",warn:"#D97706",error:"#DC2626",info:"#64748B"};

  return(
    <div style={{marginBottom:4}}>
      <div style={{fontSize:11,fontWeight:700,color:"#16A34A",marginBottom:8}}>🔄 同期管理</div>
      {syncErr&&<div style={{background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:7,padding:"7px 10px",fontSize:11,color:"#DC2626",marginBottom:8}}>✗ 同期エラー: {syncErr}</div>}
      {lastSync&&<div style={{fontSize:10,color:"#94A3B8",marginBottom:8}}>最終同期: {lastSync}</div>}

      {/* メインボタン */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:8}}>
        <button onClick={doTest} disabled={testing}
          style={{background:"#EEF2FF",border:"1px solid #C7D2FE",borderRadius:7,padding:"8px 4px",fontSize:11,color:"#4F46E5",fontWeight:700,cursor:"pointer"}}>
          🔍 診断
        </button>
        <button onClick={doForcePush}
          style={{background:"#16A34A",border:"none",borderRadius:7,padding:"8px 4px",fontSize:11,color:"#fff",fontWeight:700,cursor:"pointer"}}>
          📤 送信
        </button>
        <button onClick={doForcePull}
          style={{background:"#EFF6FF",border:"1px solid #BFDBFE",borderRadius:7,padding:"8px 4px",fontSize:11,color:"#2563EB",fontWeight:700,cursor:"pointer"}}>
          📥 取得
        </button>
      </div>

      {/* ログ表示 */}
      {log.length>0&&(
        <div style={{background:"#F8FAFC",borderRadius:8,padding:"8px 10px",border:"1px solid #E2E8F0",maxHeight:200,overflowY:"auto"}}>
          {log.map((l,i)=>(
            <div key={i} style={{fontSize:10,color:logColors[l.type]||"#64748B",marginBottom:2,lineHeight:1.5}}>
              {l.msg}
            </div>
          ))}
        </div>
      )}

      <div style={{fontSize:9,color:"#94A3B8",marginTop:8,lineHeight:1.7}}>
        💡 <b>🔍 診断</b>でGASの状態を確認 → <b>📤 送信</b>でこの端末のデータをGASへ → 他端末で<b>📥 取得</b>またはページ更新
      </div>
    </div>
  );
}

  const VIEW_S=new Date(TODAY.getFullYear(), TODAY.getMonth()-1, 1);
  const VIEW_E=new Date(TODAY.getFullYear(), TODAY.getMonth()+4, 0);
  const days=useMemo(()=>drange(VIEW_S,VIEW_E),[]);
  const todayIdx=useMemo(()=>days.findIndex(d=>fmtD(d)===fmtD(TODAY)),[days]);

  const{get,set,store,pull,pushAll,syncing,syncErr,synced,lastSync,setStore}=useStore();
  const admin=useAdmin();
  const{w:winW}=useWindowSize();
  const isPortrait=winW<600; // 縦向き判定（600px未満を縦向きとみなす）
  const[tab,setTab]=useState("gantt");
  const[sel,setSel]=useState(fmtD(TODAY));
  const[modal,setModal]=useState(null);
  const[form,setForm]=useState({});
  const[sheet,setSheet]=useState(null);
  const[ganttFull,setGanttFull]=useState(false);
  const[mY,setMY]=useState(()=>new Date().getFullYear());
  const[mM,setMM]=useState(()=>new Date().getMonth()+1);
  const[pwModal,setPWModal]=useState(null);
  const[slideTask,setSlideTask]=useState(null);
  const[completedOpen,setCompletedOpen]=useState(false); // 完工した工事の展開

  const clients     =get("clients");
  const sites       =get("sites");
  const tasks       =get("tasks");
  const workerMaster=get("workerMaster");
  const attendance  =get("attendance");
  const reports     =get("reports");

  // 稼働中 / 完工済みで分類
  const activeSites   =useMemo(()=>{
    const getName=s=>{const cl=clients.find(c=>c.id===s.clientId);return cl?.name||"";};
    return sites.filter(s=>!s.completed).sort((a,b)=>getName(a).localeCompare(getName(b),"ja"));
  },[sites,clients]);
  const completedSites=useMemo(()=>{
    const getName=s=>{const cl=clients.find(c=>c.id===s.clientId);return cl?.name||"";};
    return sites.filter(s=>s.completed).sort((a,b)=>getName(a).localeCompare(getName(b),"ja"));
  },[sites,clients]);

  // ─── ガントスクロール同期 ─────────────────────
  const hRef=useRef(null),bRef=useRef(null),lRef=useRef(null);
  const lockH=useRef(false),lockV=useRef(false);
  useEffect(()=>{
    if(todayIdx<0)return;
    // 今日を画面中央付近に表示（LW分を引いた表示幅の半分左にスクロール）
    const visibleW=Math.max(200,window.innerWidth-LW);
    const off=Math.max(0,todayIdx*DW-Math.floor(visibleW/2));
    setTimeout(()=>{
      if(hRef.current)hRef.current.scrollLeft=off;
      if(bRef.current)bRef.current.scrollLeft=off;
    },50);
  },[todayIdx]);
  const onScrollH=()=>{if(lockH.current)return;lockH.current=true;if(bRef.current)bRef.current.scrollLeft=hRef.current.scrollLeft;requestAnimationFrame(()=>lockH.current=false);};
  const onScrollB=()=>{
    if(!lockH.current){lockH.current=true;if(hRef.current)hRef.current.scrollLeft=bRef.current.scrollLeft;requestAnimationFrame(()=>lockH.current=false);}
    if(!lockV.current){lockV.current=true;if(lRef.current)lRef.current.scrollTop=bRef.current.scrollTop;requestAnimationFrame(()=>lockV.current=false);}
  };
  const onScrollL=()=>{if(lockV.current)return;lockV.current=true;if(bRef.current)bRef.current.scrollTop=lRef.current.scrollTop;requestAnimationFrame(()=>lockV.current=false);};

  // ─── 計算 ─────────────────────────────────────
  // 設定タブ用ソート済みリスト（useMemoをコンポーネントトップレベルで定義）
  const sortedClients=useMemo(()=>[...clients].sort((a,b)=>a.name.localeCompare(b.name,"ja")),[clients]);

  // 元請会社ごとに自動カラー割り当て（重複なし）
  // clients配列の順番でCOLORSを割り当て、同じ元請の現場は同じ色
  const clientColorMap=useMemo(()=>{
    const map={};
    clients.forEach((cl,i)=>{map[cl.id]=COLORS[i%COLORS.length];});
    return map;
  },[clients]);
  const siteColor=useCallback((site)=>{
    if(!site)return"#94A3B8";
    return clientColorMap[site.clientId]||site.color||"#94A3B8";
  },[clientColorMap]);
  const sortedSites  =useMemo(()=>{
    const getName=s=>{const cl=clients.find(c=>c.id===s.clientId);return cl?.name||"";};
    const active=[...sites.filter(s=>!s.completed)].sort((a,b)=>getName(a).localeCompare(getName(b),"ja"));
    const done  =[...sites.filter(s=> s.completed)].sort((a,b)=>getName(a).localeCompare(getName(b),"ja"));
    return[...active,...done];
  },[sites,clients]);
  const sortedWorkers=useMemo(()=>[...workerMaster].sort((a,b)=>a.company.localeCompare(b.company,"ja")||a.name.localeCompare(b.name,"ja")),[workerMaster]);

  const reqOnDay=date=>tasks.filter(t=>date>=t.start&&date<=t.end&&isWorkDay(date,t)).reduce((s,t)=>s+t.workers,0);
  const reqBySite=(sid,date)=>{const t=tasks.find(t=>t.siteId===sid&&date>=t.start&&date<=t.end);return(t&&isWorkDay(date,t))?t.workers:0;};

  // attendance は期間管理：その日に有効なレコードを返す
  const attOnDay=date=>attendance.filter(a=>{
    if(date<a.startDate||date>a.endDate)return false;
    return isWorkDay(date,{skipWeekend:a.skipWeekend,skipSunday:a.skipSunday,skipHoliday:a.skipHoliday,skipDates:a.skipDates});
  });
  const availOnDay=date=>attOnDay(date).filter(a=>a.status==="available").length;
  const sigOnDay=date=>{const r=reqOnDay(date),a=availOnDay(date);return!r?null:a>r?"over":a===r?"just":"lack";};
  const sigColor=s=>!s?"#94A3B8":s==="over"?SIG.over:s==="just"?SIG.just:SIG.lack;

  // ガントバー分割
  const barSegs=task=>{
    const si=days.findIndex(d=>fmtD(d)===task.start);
    const ei=days.findIndex(d=>fmtD(d)===task.end);
    if(si<0||ei<0)return[];
    const segs=[];let ss=null,sk=null;
    for(let i=si;i<=ei;i++){
      const s=!isWorkDay(fmtD(days[i]),task);
      if(ss===null){ss=i;sk=s;}
      else if(s!==sk){segs.push({left:ss*DW+2,width:(i-ss)*DW-2,skip:sk,startI:ss});ss=i;sk=s;}
    }
    if(ss!==null)segs.push({left:ss*DW+2,width:(ei-ss+1)*DW-4,skip:sk,startI:ss});
    return segs;
  };

  // ─── CRUD ─────────────────────────────────────
  const openModal=(type,mode,data={})=>{setForm({...data});setModal({type,mode});};
  const closeModal=()=>setModal(null);

  const saveTask=()=>{
    if(!form.name||!form.start||!form.end)return;
    const e={...form,workers:+form.workers||1};
    if(modal.mode==="add")set("tasks",[...tasks,{...e,id:uid()}]);
    else set("tasks",tasks.map(t=>t.id===e.id?e:t));
    closeModal();
  };
  const delTask=id=>{set("tasks",tasks.filter(t=>t.id!==id));closeModal();};

  // 工程スライド（日程を±N日ずらす）
  const slideTaskDays=(taskId,delta)=>{
    set("tasks",tasks.map(t=>{
      if(t.id!==taskId)return t;
      return{...t,start:addDays(t.start,delta),end:addDays(t.end,delta)};
    }));
  };

  const saveAtt=()=>{
    if(!form.workerName||!form.company||!form.startDate)return;
    const e={...form,endDate:form.endDate||form.startDate};
    if(modal.mode==="add")set("attendance",[...attendance,{...e,id:uid()}]);
    else set("attendance",attendance.map(a=>a.id===e.id?e:a));
    closeModal();
  };
  const delAtt=id=>{set("attendance",attendance.filter(a=>a.id!==id));closeModal();};

  const saveReport=(allowEdit=false)=>{
    if(!form.date||!form.siteId)return;
    const e={...form,safety:!!form.safety,locked:!allowEdit};
    // 新しい作業員をマスタに自動追加
    const newWorkers=(form.workers||[]).filter(w=>w.name&&w.company&&!workerMaster.find(m=>m.name===w.name));
    if(newWorkers.length>0){
      const newMaster=[...workerMaster,...newWorkers.map(w=>({id:uid(),name:w.name,company:w.company,note:""}))];
      set("workerMaster",newMaster);
    }
    if(modal.mode==="add")set("reports",[...reports,{...e,id:uid()}]);
    else set("reports",reports.map(r=>r.id===e.id?e:r));
    closeModal();
  };
  const delReport=(id,isAdmin)=>{
    if(!isAdmin){setPWModal({title:"日報の削除には管理者権限が必要です",onSuccess:()=>{set("reports",reports.filter(r=>r.id!==id));closeModal();setPWModal(null);}});return;}
    set("reports",reports.filter(r=>r.id!==id));closeModal();
  };

  const saveClient=()=>{if(!form.name)return;if(modal.mode==="add")set("clients",[...clients,{...form,id:uid()}]);else set("clients",clients.map(c=>c.id===form.id?form:c));closeModal();};
  const saveSite=()=>{if(!form.name)return;const e={...form,clientId:form.clientId,capacity:+form.capacity||4};if(modal.mode==="add")set("sites",[...sites,{...e,id:uid(),color:e.color||COLORS[sites.length%COLORS.length]}]);else set("sites",sites.map(s=>s.id===e.id?e:s));closeModal();};
  const saveWM=()=>{if(!form.name||!form.company)return;if(modal.mode==="add")set("workerMaster",[...workerMaster,{...form,id:uid()}]);else set("workerMaster",workerMaster.map(w=>w.id===form.id?form:w));closeModal();};

  // ─── 月次集計 ─────────────────────────────────
  const mPfx=`${mY}-${Z(mM)}`;
  const mReports=useMemo(()=>reports.filter(r=>r.date?.startsWith(mPfx)),[reports,mPfx]);
  const mAtt=useMemo(()=>{
    const list=[];
    attendance.forEach(a=>{
      const s=parseD(a.startDate),e=parseD(a.endDate);
      let c=new Date(s);
      while(c<=e){
        const ds=fmtD(c);
        if(ds.startsWith(mPfx)&&isWorkDay(ds,{skipWeekend:a.skipWeekend,skipSunday:a.skipSunday,skipHoliday:a.skipHoliday,skipDates:a.skipDates})&&a.status==="available"){
          list.push({...a,date:ds});
        }
        c.setDate(c.getDate()+1);
      }
    });
    return list;
  },[attendance,mPfx]);

  const byClient=useMemo(()=>{const m={};mReports.forEach(r=>{const site=sites.find(s=>s.id===r.siteId);const cl=site?clients.find(c=>c.id===site.clientId):null;const k=r.clientName||cl?.name||"不明";if(!m[k])m[k]={name:k,cnt:0,workers:0,days:new Set()};m[k].cnt++;m[k].workers+=r.totalWorkers||0;m[k].days.add(r.date);});return Object.values(m).map(x=>({...x,dayCnt:x.days.size})).sort((a,b)=>b.cnt-a.cnt);},[mReports,sites,clients]);
  const bySite=useMemo(()=>{const m={};mReports.forEach(r=>{const site=sites.find(s=>s.id===r.siteId);const k=r.siteId;if(!m[k])m[k]={id:k,name:site?.name||"不明",color:site?.color||"#94A3B8",cnt:0,workers:0,days:new Set()};m[k].cnt++;m[k].workers+=r.totalWorkers||0;m[k].days.add(r.date);});return Object.values(m).map(x=>({...x,dayCnt:x.days.size})).sort((a,b)=>b.cnt-a.cnt);},[mReports,sites]);
  const byCompany=useMemo(()=>{const m={};mAtt.forEach(a=>{if(!m[a.company])m[a.company]={co:a.company,workers:new Set(),days:0};m[a.company].workers.add(a.workerName);m[a.company].days++;});return Object.values(m).map(x=>({...x,wCnt:x.workers.size})).sort((a,b)=>b.days-a.days);},[mAtt]);
  const byWorker=useMemo(()=>{const m={};mAtt.forEach(a=>{if(!m[a.workerName])m[a.workerName]={name:a.workerName,co:a.company,days:new Set()};m[a.workerName].days.add(a.date);});return Object.values(m).map(x=>({...x,cnt:x.days.size,dl:[...x.days].sort()})).sort((a,b)=>b.cnt-a.cnt);},[mAtt]);
  const mAbsent=useMemo(()=>{const list=[];mReports.forEach(r=>{(r.absentees||[]).forEach(ab=>{list.push({date:r.date,site:sites.find(s=>s.id===r.siteId)?.name||"",name:ab.name});});});return list.sort((a,b)=>b.date.localeCompare(a.date));},[mReports,sites]);

  // 月次：現場毎の常用/請負人数
  const bySiteJobType=useMemo(()=>{
    const m={};
    mReports.forEach(r=>{
      const site=sites.find(s=>s.id===r.siteId);
      const k=r.siteId;
      if(!m[k])m[k]={siteId:k,name:site?.name||"不明",color:site?.color||"#94A3B8",regular:0,contract:0};
      (r.jobTypes||[]).forEach(jt=>{
        const cnt=(jt.workers||[]).length;
        if(jt.type==="常用")m[k].regular+=cnt;
        else m[k].contract+=cnt;
      });
    });
    return Object.values(m);
  },[mReports,sites]);

  // 月次：現場毎の搬出入車両
  const bySiteVehicle=useMemo(()=>{
    const m={};
    mReports.forEach(r=>{
      const site=sites.find(s=>s.id===r.siteId);
      const k=r.siteId;
      if(!m[k])m[k]={siteId:k,name:site?.name||"不明",color:site?.color||"#94A3B8",vehicles:{}};
      (r.vehicles||[]).forEach(v=>{
        const key=`${v.contractType}_${v.size}`;
        m[k].vehicles[key]=(m[k].vehicles[key]||0)+1;
      });
    });
    return Object.values(m);
  },[mReports,sites]);

  // 月次：作業員別遅刻日数
  const byWorkerLate=useMemo(()=>{
    const m={};
    mReports.forEach(r=>{
      (r.latecomers||[]).forEach(l=>{
        if(!m[l.name])m[l.name]={name:l.name,cnt:0,dates:[]};
        m[l.name].cnt++;
        m[l.name].dates.push(r.date);
      });
    });
    return Object.values(m).sort((a,b)=>b.cnt-a.cnt);
  },[mReports]);

  // 月次：現場毎インシデント一覧
  // 月次：請負工事予実（全期間、月フィルタなし）
  const contractProgress=useMemo(()=>{
    return tasks
      .filter(t=>t.isContract&&t.plannedManDays>0)
      .map(t=>{
        const site=sites.find(s=>s.id===t.siteId);
        const p=calcProgress(t,reports,TODAY);
        return{task:t,site,progress:p};
      })
      .filter(x=>x.progress);
  },[tasks,sites,reports]);

  const bySiteIncident=useMemo(()=>{
    const m={};
    mReports.filter(r=>r.incident).forEach(r=>{
      const site=sites.find(s=>s.id===r.siteId);
      const k=r.siteId;
      if(!m[k])m[k]={siteId:k,name:site?.name||"不明",color:site?.color||"#94A3B8",incidents:[]};
      m[k].incidents.push({date:r.date,text:r.incident});
    });
    return Object.values(m);
  },[mReports,sites]);

  // 選択日集計
  const selAtt=attOnDay(sel);
  const selAvail=selAtt.filter(a=>a.status==="available").length;
  const selReq=reqOnDay(sel);
  const selShort=Math.max(0,selReq-selAvail);
  const selSig=sigOnDay(sel);
  const selObj=parseD(sel);
  const isWE=selObj.getDay()===0||selObj.getDay()===6;
  const isHoliday=HOLIDAYS.has(sel);

  // 日報新規作成時：選択日の工程から自動入力
  const buildReportDefault=(date)=>{
    const dayTasks=tasks.filter(t=>date>=t.start&&date<=t.end&&isWorkDay(date,t));
    const firstTask=dayTasks[0];
    const site=firstTask?sites.find(s=>s.id===firstTask.siteId):null;
    const cl=site?clients.find(c=>c.id===site.clientId):null;
    const dayWorkers=attOnDay(date).filter(a=>a.status==="available").map(a=>({name:a.workerName,company:a.company}));
    return{
      date,
      siteId:firstTask?.siteId||sites[0]?.id||"",
      clientName:cl?.name||"",
      workers:dayWorkers,
      totalWorkers:dayWorkers.length,
      weather:"晴れ",
      jobTypes:[{type:"常用",workers:dayWorkers,work:firstTask?firstTask.name:"",overtime:false,overtimeDetails:[]}],
      latecomers:[],
      vehicles:[],
      highway:"",parking:false,parkingFee:0,gas:0,otherExpense:"",
      absentees:[],safety:true,incident:"",by:"",
      locked:false,
    };
  };

  // ─── レンダリング ─────────────────────────────
  return(
  <div style={{height:"100%",display:"flex",flexDirection:"column",background:"#F1F5F9"}}>

    {/* HEADER */}
    <div style={{background:"#1E293B",padding:"6px 12px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <div style={{width:3,height:26,background:"#F97316",borderRadius:2}}/>
        <div>
          <div style={{fontFamily:"'Oswald',sans-serif",fontSize:13,color:"#F97316",letterSpacing:".10em"}}>工程管理システム</div>
          <div style={{fontSize:9,color:"#475569"}}>CONSTRUCTION MANAGEMENT</div>
        </div>
      </div>
      <div style={{display:"flex",gap:8,alignItems:"center"}}>
        <div style={{background:"#FFF7ED",border:"1px solid #FED7AA",borderRadius:6,padding:"5px 11px",fontSize:13,color:"#EA580C",fontWeight:700}}>{fmtD(TODAY)}（{DOW[TODAY.getDay()]}）</div>
        {admin.isAdmin&&<div style={{background:"#F0FDF4",border:"1px solid #BBF7D0",borderRadius:5,padding:"2px 7px",fontSize:10,color:"#16A34A",fontWeight:700}}>管理者</div>}
        <button onClick={pull} style={{background:"#334155",border:"none",borderRadius:6,padding:"4px 9px",fontSize:11,color:"#94A3B8",cursor:"pointer"}}>{syncing?"⟳":"↻"}</button>
      </div>
    </div>

    {/* 同期バー */}
    {(syncErr||synced||!gasOK())&&(
      <div style={{background:syncErr?"#FEF2F2":gasOK()?"#F0FDF4":"#FFFBEB",borderBottom:`1px solid ${syncErr?"#FECACA":gasOK()?"#BBF7D0":"#FDE68A"}`,padding:"3px 14px",fontSize:10,color:syncErr?"#DC2626":gasOK()?"#16A34A":"#B45309",display:"flex",justifyContent:"space-between"}}>
        <span>{syncErr?`✗ ${syncErr}`:gasOK()?"✓ スプレッドシート連携中":"⚠ オフラインモード（GAS未設定）"}</span>
        {lastSync&&<span style={{color:"#94A3B8"}}>最終同期 {lastSync}</span>}
      </div>
    )}

    {/* TABS */}
    <div style={{background:"#fff",borderBottom:"1px solid #E2E8F0",display:"flex",flexShrink:0}}>
      {TABS.map(t=>(
        <button key={t.id} onClick={()=>setTab(t.id)}
          style={{flex:1,background:tab===t.id?"#FFF7ED":"transparent",border:"none",borderBottom:tab===t.id?"2px solid #F97316":"2px solid transparent",padding:"6px 2px 5px",color:tab===t.id?"#F97316":"#94A3B8",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:0}}>
          <span style={{fontSize:20}}>{t.icon}</span>
          <span style={{fontSize:10,fontWeight:700}}>{t.label}</span>
        </button>
      ))}
    </div>

    <div style={{flex:1,overflow:"hidden",minHeight:0}}>

    {/* ══ ガントチャート ══ */}
    {tab==="gantt"&&(
      <div style={{display:"flex",flexDirection:isPortrait?"column":"row",height:"100%",overflow:"hidden",position:"relative"}}>
        {/* ガント本体 */}
        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",minHeight:isPortrait?"55%":undefined}}>

          {/* 日付ヘッダー */}
          <div style={{display:"flex",background:"#1E293B",flexShrink:0}}>
            <div style={{width:LW,flexShrink:0,borderRight:"1px solid #334155",padding:"5px 8px",display:"flex",flexDirection:"column",justifyContent:"flex-end",gap:2}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:9,color:"#64748B"}}>現場 / 工程</span>
                <button onClick={()=>setGanttFull(f=>!f)}
                  style={{background:"rgba(249,115,22,.15)",border:"1px solid rgba(249,115,22,.3)",borderRadius:5,padding:"2px 7px",fontSize:9,color:"#FB923C",fontWeight:700,cursor:"pointer",flexShrink:0}}>
                  {ganttFull?(isPortrait?"▼ 戻す":"◀ 戻す"):(isPortrait?"▲ 全画面":"▶ 全画面")}
                </button>
              </div>
              <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                {[["#16A34A","余裕"],["#D97706","ぴったり"],["#DC2626","不足"],["#F0ABFC","祝日"],["#93C5FD","土"],["#F87171","日"]].map(([c,l])=>(
                  <div key={l} style={{display:"flex",alignItems:"center",gap:2}}>
                    <div style={{width:6,height:6,borderRadius:1,background:c}}/>
                    <span style={{fontSize:7,color:"#64748B"}}>{l}</span>
                  </div>
                ))}
              </div>
            </div>
            <div ref={hRef} style={{flex:1,overflowX:"auto",overflowY:"hidden"}} onScroll={onScrollH}>
              <div style={{display:"flex",width:days.length*DW}}>
                {days.map((d,i)=>{
                  const ds=fmtD(d),isT=ds===fmtD(TODAY),isS=ds===sel;
                  const req=reqOnDay(ds),avl=availOnDay(ds),sh=Math.max(0,req-avl);
                  const sig=sigOnDay(ds);
                  const fillH=req>0?Math.min(100,Math.round((avl/req)*100)):0;
                  const txtC=dayColor(ds,isT,isS);
                  const bgC=dayBg(ds,isT,isS);
                  return(
                    <div key={i} onClick={()=>setSel(ds)}
                      style={{width:DW,flexShrink:0,textAlign:"center",padding:"2px 0 0",borderRight:"1px solid #334155",background:bgC,position:"relative",overflow:"hidden",cursor:"pointer",
                        ...(isT?{boxShadow:"inset 0 0 0 2px #F97316"}:{})}}>
                      {/* 今日ラベル */}
                      {isT&&!isS&&<div style={{position:"absolute",top:0,left:0,right:0,height:3,background:"#F97316"}}/>}
                      {/* 充足バー */}
                      {req>0&&!isS&&<div style={{position:"absolute",bottom:0,left:0,right:0,height:`${fillH}%`,background:sigColor(sig),opacity:.22,pointerEvents:"none"}}/>}
                      <div style={{position:"relative",zIndex:1}}>
                        {isT&&!isS&&<div style={{fontSize:7,color:"#F97316",fontWeight:900,lineHeight:1}}>TODAY</div>}

              const cl=clients.find(c=>c.id===site.clientId);

              return(
                <div key={site.id} style={{background:"#fff",borderRadius:9,marginBottom:6,border:`1px solid ${req?siteColor(site)+"33":"#F1F5F9"}`,overflow:"hidden",boxShadow:"0 1px 3px rgba(0,0,0,.04)"}}>

                      <div style={{display:"flex",alignItems:"center",gap:5,flexShrink:0}}>

                          :<button onClick={()=>openModal("task","add",{siteId:site.id,name:"",start:sel,end:sel,workers:1,memo:"",note:""})} style={{background:"#F0FDF4",border:"1px solid #BBF7D0",borderRadius:5,padding:"2px 7px",fontSize:9,color:"#16A34A",cursor:"pointer"}}>＋工程</button>}

    {/* ══ 稼働管理 ══ */}
    {tab==="staff"&&(
      <div style={{height:"100%",overflowY:"auto",padding:12}}>
        <div style={{maxWidth:680,margin:"0 auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{fontFamily:"'Oswald',sans-serif",fontSize:18,color:"#16A34A",letterSpacing:".06em"}}>稼働管理</div>

          {workerMaster.filter(wm=>!selAtt.find(a=>a.workerId===wm.id)).length>0&&(

                  <div><div style={{fontSize:12,fontWeight:700,color:"#1E293B"}}>{wm.name}</div><div style={{fontSize:10,color:"#94A3B8"}}>{wm.company}</div></div>

                        </div>
                        <div style={{display:"flex",flexWrap:"wrap",gap:3,marginBottom:3}}>
                          {(jt.workers||[]).map((w,i)=><span key={i} style={{background:"#F8FAFC",border:"1px solid #E2E8F0",borderRadius:4,padding:"1px 6px",fontSize:10,color:"#475569"}}>{w.name}<span style={{color:"#94A3B8",fontSize:9,marginLeft:2}}>{w.company}</span></span>)}
                        </div>
                        {jt.work&&<div style={{fontSize:11,color:"#475569",paddingLeft:2}}>{jt.work}</div>}
                        {jt.overtime&&(jt.overtimeDetails||[]).length>0&&<div style={{fontSize:11,color:"#D97706",paddingLeft:2,marginTop:2}}>残業：{(jt.overtimeDetails||[]).map(o=>`${o.name} ${o.hours}h`).join("、")}</div>}

              {!admin.isAdmin&&<button onClick={()=>setPWModal({title:"月次集計の編集には管理者権限が必要です",onSuccess:()=>{setPWModal(null);}})} style={{background:"#F8FAFC",border:"1px solid #E2E8F0",borderRadius:6,padding:"4px 10px",fontSize:11,color:"#64748B",cursor:"pointer"}}>🔐 管理者ログイン</button>}
              {admin.isAdmin&&<button onClick={admin.logout} style={{background:"#F0FDF4",border:"1px solid #BBF7D0",borderRadius:6,padding:"4px 10px",fontSize:11,color:"#16A34A",cursor:"pointer"}}>ログアウト</button>}
            </div>

          <SH title="現場別" csvFn={()=>{const r=[["現場名","日報件数","稼働日数","延べ人工"]];bySite.forEach(s=>r.push([s.name,s.cnt,s.dayCnt,s.workers]));dlCSV(`現場別_${mY}${Z(mM)}.csv`,r);}}>

          <SH title="所属会社別" csvFn={()=>{const r=[["会社名","作業員数","延べ稼働"]];byCompany.forEach(c=>r.push([c.co,c.wCnt,c.days]));dlCSV(`会社別_${mY}${Z(mM)}.csv`,r);}}>
            {byCompany.length===0?<div style={{textAlign:"center",color:"#CBD5E1",padding:"14px",fontSize:12}}>データなし</div>
            :byCompany.map((c,i)=><TR key={c.co} alt={i%2===1} cols={[{v:c.co,b:true},{w:"60px",v:c.wCnt+"名",c:"#3B82F6",num:true,center:true},{w:"60px",v:c.days+"日",c:"#F97316",num:true,center:true}]}/>)}
          </SH>

          <SH title="作業員別" csvFn={()=>{const r=[["作業員名","所属会社","出勤日数","出勤日"]];byWorker.forEach(w=>r.push([w.name,w.co,w.cnt,w.dl.join(" / ")]));dlCSV(`作業員別_${mY}${Z(mM)}.csv`,r);}}>
            {byWorker.length===0?<div style={{textAlign:"center",color:"#CBD5E1",padding:"14px",fontSize:12}}>データなし</div>
            :byWorker.map((w,i)=>(
              <div key={w.name} style={{display:"grid",gridTemplateColumns:"1fr 1fr 48px",padding:"9px 12px",borderBottom:"1px solid #F1F5F9",background:i%2===1?"#FAFBFC":"#fff",alignItems:"start",gap:4}}>
                <div><div style={{fontSize:12,fontWeight:700,color:"#1E293B"}}>{w.name}</div><div style={{fontSize:9,color:"#94A3B8",marginTop:1}}>{w.dl.map(d=>d.slice(5).replace("-","/")).join("  ")}</div></div>
                <span style={{fontSize:11,color:"#64748B",paddingTop:2}}>{w.co}</span>
                <span style={{fontFamily:"'Oswald',sans-serif",fontSize:18,color:"#16A34A",textAlign:"center"}}>{w.cnt}<span style={{fontSize:9,color:"#94A3B8"}}>日</span></span>
              </div>
            ))}
          </SH>

          <SH title="当欠一覧" csvFn={()=>{const r=[["日付","現場","作業員名"]];mAbsent.forEach(a=>r.push([a.date,a.site,a.name]));dlCSV(`当欠_${mY}${Z(mM)}.csv`,r);}}>
            {mAbsent.length===0?<div style={{textAlign:"center",color:"#CBD5E1",padding:"14px",fontSize:12}}>当欠なし</div>
            :mAbsent.map((a,i)=>(
              <div key={`${a.date}-${a.name}`} style={{display:"grid",gridTemplateColumns:"52px 1fr 1fr",padding:"9px 12px",borderBottom:"1px solid #F1F5F9",background:i%2===1?"#FAFBFC":"#fff",alignItems:"center",gap:4}}>
                <span style={{fontSize:10,color:"#64748B"}}>{a.date.slice(5).replace("-","/")}</span>
                <span style={{fontSize:11,color:"#475569"}}>{a.site}</span>
                <span style={{fontSize:12,fontWeight:700,color:"#DC2626"}}>{a.name}</span>
              </div>
            ))}
          </SH>

          {/* 遅刻：作業員別 */}
          <SH title="遅刻一覧（作業員別）" csvFn={()=>{const r=[["作業員名","遅刻日数","日付"]];byWorkerLate.forEach(w=>r.push([w.name,w.cnt,w.dates.join(" / ")]));dlCSV(`遅刻_${mY}${Z(mM)}.csv`,r);}}>
            {byWorkerLate.length===0?<div style={{textAlign:"center",color:"#CBD5E1",padding:"14px",fontSize:12}}>遅刻なし</div>
            :byWorkerLate.map((w,i)=>(
              <div key={w.name} style={{display:"grid",gridTemplateColumns:"1fr 48px 2fr",padding:"9px 12px",borderBottom:"1px solid #F1F5F9",background:i%2===1?"#FAFBFC":"#fff",alignItems:"center",gap:4}}>
                <span style={{fontSize:12,fontWeight:700,color:"#F59E0B"}}>{w.name}</span>
                <span style={{fontFamily:"'Oswald',sans-serif",fontSize:16,color:"#F59E0B",textAlign:"center"}}>{w.cnt}<span style={{fontSize:9,color:"#94A3B8"}}>日</span></span>
                <span style={{fontSize:9,color:"#94A3B8"}}>{w.dates.map(d=>d.slice(5).replace("-","/")).join("  ")}</span>
              </div>
            ))}
          </SH>

          {/* 現場別：常用/請負人数 */}
          <SH title="現場別 常用・請負人数" csvFn={()=>{const r=[["現場名","常用（延べ人数）","請負（延べ人数）"]];bySiteJobType.forEach(s=>r.push([s.name,s.regular,s.contract]));dlCSV(`工事種別_${mY}${Z(mM)}.csv`,r);}}>
            {bySiteJobType.length===0?<div style={{textAlign:"center",color:"#CBD5E1",padding:"14px",fontSize:12}}>データなし</div>
            :bySiteJobType.map((s,i)=>(
              <div key={s.siteId} style={{display:"grid",gridTemplateColumns:"1fr 80px 80px",padding:"9px 12px",borderBottom:"1px solid #F1F5F9",background:i%2===1?"#FAFBFC":"#fff",alignItems:"center",gap:4,borderLeft:`3px solid ${siteColor(s)}`}}>
                <span style={{fontSize:12,fontWeight:700,color:siteColor(s)}}>{s.name}</span>
                <div style={{textAlign:"center"}}>
                  <div style={{fontSize:8,color:"#2563EB",marginBottom:1}}>常用</div>
                  <span style={{fontFamily:"'Oswald',sans-serif",fontSize:16,color:"#2563EB"}}>{s.regular}<span style={{fontSize:9}}>人</span></span>
                </div>
                <div style={{textAlign:"center"}}>
                  <div style={{fontSize:8,color:"#16A34A",marginBottom:1}}>請負</div>
                  <span style={{fontFamily:"'Oswald',sans-serif",fontSize:16,color:"#16A34A"}}>{s.contract}<span style={{fontSize:9}}>人</span></span>
                </div>
              </div>
            ))}
          </SH>

          {/* 現場別：搬出入車両 */}
          <SH title="現場別 搬出入車両" csvFn={()=>{const r=[["現場名","常用/請負","車両サイズ","台数"]];bySiteVehicle.forEach(s=>{Object.entries(s.vehicles).forEach(([k,cnt])=>{const[ct,sz]=k.split("_");r.push([s.name,ct,sz+"車",cnt]);});});dlCSV(`車両_${mY}${Z(mM)}.csv`,r);}}>
            {bySiteVehicle.length===0?<div style={{textAlign:"center",color:"#CBD5E1",padding:"14px",fontSize:12}}>データなし</div>
            :bySiteVehicle.map((s,i)=>(
              <div key={s.siteId} style={{padding:"9px 12px",borderBottom:"1px solid #F1F5F9",background:i%2===1?"#FAFBFC":"#fff",borderLeft:`3px solid ${siteColor(s)}`}}>
                <div style={{fontSize:12,fontWeight:700,color:siteColor(s),marginBottom:5}}>{s.name}</div>
                {Object.keys(s.vehicles).length===0?<span style={{fontSize:11,color:"#CBD5E1"}}>なし</span>
                :<div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                  {Object.entries(s.vehicles).map(([k,cnt])=>{const[ct,sz]=k.split("_");return(
                    <span key={k} style={{background:"#F8FAFC",border:"1px solid #E2E8F0",borderRadius:5,padding:"2px 9px",fontSize:11,color:"#475569"}}>{ct} / {sz}車 <strong style={{color:"#1E293B"}}>{cnt}台</strong></span>
                  );})}
                </div>}
              </div>
            ))}
          </SH>

          {/* 現場別：インシデント一覧（管理者のみ） */}
          {!admin.isAdmin?(
            <div style={{background:"#fff",borderRadius:10,border:"1px solid #FED7AA",marginBottom:12,padding:"16px",textAlign:"center"}}>
              <div style={{fontSize:13,color:"#D97706",fontWeight:700,marginBottom:8}}>🔐 インシデント一覧</div>
              <div style={{fontSize:11,color:"#94A3B8",marginBottom:10}}>閲覧には管理者パスワードが必要です</div>
              <button onClick={()=>setPWModal({title:"インシデント一覧の閲覧",onSuccess:()=>setPWModal(null)})} style={{background:"#FFF7ED",border:"1px solid #FED7AA",borderRadius:8,padding:"8px 20px",fontSize:12,color:"#EA580C",fontWeight:700,cursor:"pointer"}}>🔑 パスワードを入力</button>
            </div>
          ):(
          <SH title="現場別 インシデント一覧 🔐" csvFn={()=>{const r=[["現場名","日付","内容"]];bySiteIncident.forEach(s=>s.incidents.forEach(inc=>r.push([s.name,inc.date,inc.text])));dlCSV(`インシデント_${mY}${Z(mM)}.csv`,r);}}>
            {bySiteIncident.length===0?<div style={{textAlign:"center",color:"#CBD5E1",padding:"14px",fontSize:12}}>インシデントなし</div>
            :bySiteIncident.map((s,i)=>(
              <div key={s.siteId} style={{padding:"9px 12px",borderBottom:"1px solid #F1F5F9",background:i%2===1?"#FAFBFC":"#fff",borderLeft:`3px solid ${siteColor(s)}`}}>
                <div style={{fontSize:12,fontWeight:700,color:siteColor(s),marginBottom:5}}>{s.name}</div>
                {s.incidents.map((inc,j)=>(
                  <div key={j} style={{display:"flex",gap:8,marginBottom:4}}>
                    <span style={{fontSize:10,color:"#94A3B8",flexShrink:0,marginTop:1}}>{inc.date.slice(5).replace("-","/")}</span>
                    <span style={{fontSize:12,color:"#DC2626"}}>{inc.text}</span>
                  </div>
                ))}
              </div>
            ))}
          </SH>
          )}

          {/* 請負工事 予実管理 */}
          <div style={{background:"#fff",borderRadius:10,overflow:"hidden",border:"1px solid #DDD6FE",marginBottom:12}}>
            <div style={{background:"#F5F3FF",padding:"8px 12px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1px solid #DDD6FE"}}>
              <span style={{fontSize:11,color:"#6D28D9",fontWeight:700}}>▍請負工事 予実管理</span>
              <button onClick={()=>{
                const r=[["現場名","工程名","予定人工","実績人工","予定進捗%","実績進捗%","乖離%","状態"]];
                contractProgress.forEach(({task,site,progress:p})=>{
                  const st=p.gap>=0?"順調":p.gap>=-10?"やや遅延":"遅延";
                  r.push([site?.name||"",task.name,p.planned,p.actual,p.plannedPct,p.actualPct,p.gap,st]);
                });
                dlCSV(`請負予実_${mY}${Z(mM)}.csv`,r);
              }} style={{background:"#EDE9FE",border:"1px solid #DDD6FE",borderRadius:5,padding:"4px 9px",fontSize:10,color:"#7C3AED",fontWeight:700,cursor:"pointer"}}>📥 CSV</button>
            </div>
            {contractProgress.length===0
              ?<div style={{textAlign:"center",color:"#CBD5E1",padding:"18px",fontSize:12}}>請負工事（予実管理ON）の工程がありません</div>
              :contractProgress.map(({task,site,progress:p},i)=>{
                const gapColor=p.gap>=0?"#16A34A":p.gap>=-10?"#D97706":"#DC2626";
                const statusLabel=p.gap>=0?"✓ 順調":p.gap>=-10?"△ やや遅延":"✗ 遅延";
                return(
                  <div key={task.id} style={{padding:"10px 12px",borderBottom:"1px solid #F1F5F9",background:i%2===1?"#FAFBFC":"#fff"}}>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                      <div>
                        <div style={{display:"flex",alignItems:"center",gap:6}}>
                          <div style={{width:8,height:8,borderRadius:2,background:site?.color||"#94A3B8",flexShrink:0}}/>
                          <span style={{fontSize:12,fontWeight:700,color:site?.color||"#94A3B8"}}>{site?.name||"不明"}</span>
                          <span style={{fontSize:11,color:"#64748B"}}>/ {task.name}</span>
                        </div>
                        <div style={{fontSize:9,color:"#94A3B8",marginTop:1,paddingLeft:14}}>{task.start} 〜 {task.end}</div>
                      </div>
                      <div style={{background:`${gapColor}14`,border:`1px solid ${gapColor}44`,borderRadius:6,padding:"3px 9px",fontSize:11,fontWeight:700,color:gapColor,flexShrink:0}}>{statusLabel}</div>
                    </div>
                    {/* 数値グリッド */}
                    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:4,marginBottom:7}}>
                      {[
                        {l:"予定人工",v:p.planned+"人工",c:"#3B82F6"},
                        {l:"実績人工",v:p.actual+"人工",c:gapColor},
                        {l:"予定進捗",v:p.plannedPct+"%",c:"#3B82F6"},
                        {l:"実績進捗",v:p.actualPct+"%",c:gapColor},
                      ].map(x=>(
                        <div key={x.l} style={{background:"#F8FAFC",borderRadius:6,padding:"5px 4px",textAlign:"center",border:"1px solid #E2E8F0"}}>
                          <div style={{fontSize:8,color:"#94A3B8"}}>{x.l}</div>
                          <div style={{fontFamily:"'Oswald',sans-serif",fontSize:14,fontWeight:700,color:x.c}}>{x.v}</div>
                        </div>
                      ))}
                    </div>
                    {/* 予実バー */}
                    <div style={{marginBottom:3}}>
                      <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:"#94A3B8",marginBottom:2}}>
                        <span>予定</span><span style={{color:"#3B82F6",fontWeight:700}}>{p.plannedPct}%</span>
                      </div>
                      <div style={{height:7,background:"#E2E8F0",borderRadius:3,overflow:"hidden"}}>
                        <div style={{height:"100%",width:`${Math.min(p.plannedPct,100)}%`,background:"#3B82F6",borderRadius:3}}/>
                      </div>
                    </div>
                    <div>
                      <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:"#94A3B8",marginBottom:2}}>
                        <span>実績</span>
                        <span style={{color:gapColor,fontWeight:700}}>{p.actualPct}% （乖離 {p.gap>=0?"+":""}{p.gap}%）</span>
                      </div>
                      <div style={{height:7,background:"#E2E8F0",borderRadius:3,overflow:"hidden"}}>
                        <div style={{height:"100%",width:`${Math.min(p.actualPct,100)}%`,background:gapColor,borderRadius:3,transition:"width .5s"}}/>
                      </div>
                    </div>
                    {task.progressNote&&<div style={{fontSize:10,color:"#6D28D9",marginTop:5,padding:"3px 7px",background:"#F5F3FF",borderRadius:5,border:"1px solid #DDD6FE"}}>📝 {task.progressNote}</div>}
                  </div>
                );
              })
            }
          </div>

          {/* 管理者：日報編集・削除 */}
          {admin.isAdmin&&(
            <div style={{background:"#fff",borderRadius:10,overflow:"hidden",border:"1px solid #FED7AA",marginBottom:12}}>
              <div style={{background:"#FFF7ED",padding:"8px 12px",borderBottom:"1px solid #FED7AA"}}>
                <span style={{fontSize:11,color:"#EA580C",fontWeight:700}}>🔐 管理者：日報一覧（編集・削除可）</span>
              </div>
              {mReports.length===0?<div style={{textAlign:"center",color:"#CBD5E1",padding:"14px",fontSize:12}}>データなし</div>
              :mReports.map((rp,i)=>{
                const site=sites.find(s=>s.id===rp.siteId);
                return(
                  <div key={rp.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"9px 12px",borderBottom:"1px solid #F1F5F9",background:i%2===1?"#FAFBFC":"#fff"}}>
                    <div>
                      <div style={{fontSize:12,fontWeight:700,color:"#1E293B"}}>{rp.date} — {site?.name||"?"}</div>
                      <div style={{fontSize:10,color:"#94A3B8"}}>提出: {rp.by||"─"} / {rp.totalWorkers||0}名</div>
                    </div>
                    <div style={{display:"flex",gap:6}}>
                      <button onClick={()=>openModal("report","edit",{...rp,workers:rp.workers||[],overtimeDetails:rp.overtimeDetails||[],absentees:rp.absentees||[]})}
                        style={{background:"#EEF2FF",border:"1px solid #C7D2FE",borderRadius:6,padding:"4px 9px",fontSize:11,color:"#4F46E5",cursor:"pointer",fontWeight:700}}>編集</button>
                      <button onClick={()=>{if(window.confirm("削除しますか？"))set("reports",reports.filter(r=>r.id!==rp.id));}}
                        style={{background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:6,padding:"4px 9px",fontSize:11,color:"#DC2626",cursor:"pointer",fontWeight:700}}>削除</button>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>
      );
    })()}

    {/* ══ 設定 ══ */}
    {tab==="config"&&(
      <div style={{height:"100%",overflowY:"auto",padding:12}}>
        <div style={{maxWidth:600,margin:"0 auto"}}>
          <div style={{fontFamily:"'Oswald',sans-serif",fontSize:18,color:"#F97316",letterSpacing:".06em",marginBottom:14}}>設定・マスタ管理</div>

          {[
            {title:"元請け会社",color:"#3B82F6",items:clients,
              sortedItems:sortedClients,
              add:()=>openModal("client","add",{name:""}),row:cl=>(
              <div key={cl.id} className="row" onClick={()=>openModal("client","edit",{...cl})} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"11px 12px",borderBottom:"1px solid #F1F5F9",cursor:"pointer",background:"#fff"}}>
                <div>
                  <span style={{fontSize:13,fontWeight:700,color:"#1E293B"}}>{cl.name}</span>
                  <span style={{fontSize:10,color:"#94A3B8",marginLeft:8}}>{sites.filter(s=>s.clientId===cl.id).length}現場</span>
                </div>
                <span style={{fontSize:10,color:"#CBD5E1"}}>▶</span>
              </div>
            )},
            {title:"現場一覧",color:"#F97316",items:sites,
              sortedItems:sortedSites,
              add:()=>openModal("site","add",{name:"",clientId:clients[0]?.id,capacity:4,color:COLORS[sites.length%COLORS.length]}),
              // 元請け会社ごとにグループヘッダーを挿入するためrowsを生成
              rowsWithHeader:(sortedItems)=>{
                const rows=[];let lastClient=null;let lastCompleted=false;
                sortedItems.forEach(s=>{
                  const cl=clients.find(c=>c.id===s.clientId);
                  const clName=cl?.name||"─";
                  // 完工セパレーター（稼働→完工の切り替わり時）
                  if(s.completed&&!lastCompleted){
                    rows.push({type:"sep_completed"});
                    lastClient=null; // 元請けヘッダーをリセット
                  }
                  // 元請けグループヘッダー
                  if(clName!==lastClient){
                    rows.push({type:"header",label:clName,completed:!!s.completed});
                    lastClient=clName;
                  }
                  rows.push({type:"site",site:s});
                  lastCompleted=!!s.completed;
                });
                return rows;
              },
              row:s=>{
              const cl=clients.find(c=>c.id===s.clientId);
              const taskCnt=tasks.filter(t=>t.siteId===s.id).length;
              return(<div key={s.id} className="row" onClick={()=>openModal("site","edit",{...s})} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"11px 12px",borderBottom:"1px solid #F1F5F9",cursor:"pointer",background:s.completed?"#FAFBFC":"#fff",borderLeft:`3px solid ${s.completed?"#94A3B8":siteColor(s)}`}}>
                <div>
                  <div style={{display:"flex",alignItems:"center",gap:5}}>
                    <div style={{fontSize:13,fontWeight:700,color:s.completed?"#94A3B8":siteColor(s)}}>{s.name}</div>
                    {s.completed&&<span style={{background:"#94A3B8",color:"#fff",borderRadius:4,padding:"1px 6px",fontSize:9,fontWeight:700}}>完工</span>}
                    {taskCnt>0&&<span style={{background:s.completed?"#E2E8F0":`${siteColor(s)}22`,color:s.completed?"#94A3B8":siteColor(s),borderRadius:4,padding:"1px 6px",fontSize:9,fontWeight:700}}>{taskCnt}工程</span>}
                  </div>
                  <div style={{fontSize:10,color:"#94A3B8",marginTop:1}}>上限{s.capacity}人</div>
                </div>
                <span style={{fontSize:10,color:"#CBD5E1"}}>▶</span>
              </div>);
            }},
            {title:"作業員マスタ",color:"#16A34A",items:workerMaster,
              sortedItems:sortedWorkers,
              rowsWithHeader:(sortedItems)=>{
                const rows=[];let lastCo=null;
                sortedItems.forEach(w=>{
                  if(w.company!==lastCo){rows.push({type:"header",label:w.company||"─",completed:false});lastCo=w.company;}
                  rows.push({type:"item",site:w});
                });
                return rows;
              },
              add:()=>openModal("workerM","add",{name:"",company:"",note:""}),
              row:w=>(
              <div key={w.id} className="row" onClick={()=>openModal("workerM","edit",{...w})} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"11px 12px",borderBottom:"1px solid #F1F5F9",cursor:"pointer",background:"#fff"}}>
                <div><div style={{fontSize:13,fontWeight:700,color:"#1E293B"}}>{w.name}</div>{w.note&&<div style={{fontSize:10,color:"#94A3B8",marginTop:1}}>{w.note}</div>}</div>
                <span style={{fontSize:10,color:"#CBD5E1"}}>▶</span>
              </div>
            )},
          ].map(sec=>(
            <div key={sec.title} style={{marginBottom:16}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>

                <button onClick={sec.add} style={{background:`${sec.color}14`,border:`1px solid ${sec.color}44`,borderRadius:6,padding:"4px 11px",fontSize:11,color:sec.color,fontWeight:700,cursor:"pointer"}}>＋ 追加</button>
              </div>
              <div style={{background:"#fff",borderRadius:10,overflow:"hidden",border:"1px solid #E2E8F0"}}>
                {sec.items.length===0
                  ?<div style={{textAlign:"center",color:"#CBD5E1",padding:"14px",fontSize:12}}>未登録</div>
                  :sec.rowsWithHeader
                    ? sec.rowsWithHeader(sec.sortedItems||sec.items).map((row,ri)=>{
                        if(row.type==="header") return(
                          <div key={`h${ri}`} style={{padding:"5px 12px 4px",background:row.completed?"#F1F5F9":"#FFF7ED",borderBottom:"1px solid #F1F5F9",borderTop:ri>0?"1px solid #E2E8F0":"none",display:"flex",alignItems:"center",gap:5}}>
                            <span style={{fontSize:9,color:row.completed?"#94A3B8":"#EA580C",fontWeight:700,letterSpacing:".05em"}}>{row.label}</span>
                          </div>
                        );
                        if(row.type==="sep_completed") return(
                          <div key={`sc${ri}`} style={{padding:"5px 12px",background:"#F1F5F9",borderTop:"2px solid #CBD5E1",borderBottom:"1px solid #E2E8F0",display:"flex",alignItems:"center",gap:5}}>
                            <span style={{fontSize:10,color:"#94A3B8",fontWeight:700}}>✓ 完工した工事</span>
                          </div>
                        );
                        return sec.row(row.site);

                    : (sec.sortedItems||sec.items).map(sec.row)
                }

            </div>

          {/* パスワード管理 */}

            <div style={{fontSize:13,fontWeight:700,color:"#6366F1",marginBottom:7}}>▍パスワード管理</div>
            <div style={{background:"#fff",borderRadius:10,border:"1px solid #E2E8F0",padding:"12px 14px"}}>
              {!admin.isAdmin
                ?<button onClick={()=>setPWModal({title:"管理者ログイン",onSuccess:()=>setPWModal(null)})} style={{width:"100%",background:"#EEF2FF",border:"1px solid #C7D2FE",borderRadius:8,padding:"11px",fontSize:13,color:"#4F46E5",fontWeight:700,cursor:"pointer"}}>🔐 管理者ログイン</button>
                :<div>
                  <div style={{fontSize:12,color:"#16A34A",fontWeight:700,marginBottom:10}}>✓ 管理者としてログイン中</div>
                  <PWChangeForm onSave={(o,n)=>{if(admin.changePW(o,n)){alert("パスワードを変更しました");}else{alert("現在のパスワードが違います");}}} />
                  <button onClick={admin.logout} style={{width:"100%",background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:8,padding:"10px",fontSize:13,color:"#DC2626",fontWeight:700,cursor:"pointer",marginTop:8}}>ログアウト</button>
                </div>
              }
            </div>
          </div>

          {/* バックアップ・同期 */}
          <div style={{marginBottom:16}}>
            <div style={{fontSize:13,fontWeight:700,color:"#64748B",marginBottom:7}}>▍バックアップ・同期</div>
            <div style={{background:"#fff",borderRadius:10,border:"1px solid #E2E8F0",padding:"12px 14px"}}>

              {/* 同期診断パネル */}
              {gasOK()&&(
                <SyncPanel
                  store={store}
                  pull={pull}
                  pushAll={pushAll}
                  syncing={syncing}
                  syncErr={syncErr}
                  lastSync={lastSync}
                  synced={synced}
                />
              )}

              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8,marginTop:10}}>
                <button onClick={()=>{const s=JSON.parse(localStorage.getItem(LS)||"{}");const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([JSON.stringify(s,null,2)],{type:"application/json"}));a.download=`backup_${nowStr().replace(/[: ]/g,"-")}.json`;a.click();}} style={{background:"#EEF2FF",border:"1px solid #C7D2FE",borderRadius:8,padding:"10px",fontSize:12,color:"#4F46E5",fontWeight:700,cursor:"pointer"}}>📥 JSONバックアップ</button>
                <label style={{background:"#F0FDF4",border:"1px solid #BBF7D0",borderRadius:8,padding:"10px",fontSize:12,color:"#16A34A",fontWeight:700,cursor:"pointer",textAlign:"center"}}>
                  📂 JSONから復元
                  <input type="file" accept=".json" style={{display:"none"}} onChange={e=>{const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);localStorage.setItem(LS,JSON.stringify(d));alert("復元しました。ページを更新してください");}catch(_){alert("ファイルエラー");}};r.readAsText(e.target.files[0]);}}/>
                </label>
              </div>
            </div>
          </div>
        </div>
      </div>
    )}

    </div>

    {/* ══ ボトムシート：工程詳細 ══ */}
    {sheet?.type==="task"&&(()=>{
      const{task,site}=sheet;
      const cl=clients.find(c=>c.id===site.clientId);
      const wd=workDays(task);
      const sl=skipLabel(task);
      return(
        <div onClick={()=>setSheet(null)} style={{position:"fixed",inset:0,background:"rgba(15,23,42,.45)",zIndex:400,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:"16px 16px 0 0",width:"100%",maxWidth:480,maxHeight:"85vh",overflowY:"auto",boxShadow:"0 -8px 30px rgba(0,0,0,.15)"}}>
            <div style={{width:40,height:4,background:"#E2E8F0",borderRadius:2,margin:"12px auto 0"}}/>
            <div style={{background:siteColor(site),padding:"11px 16px",margin:"10px 12px",borderRadius:10}}>
              <div style={{fontSize:16,fontWeight:900,color:"#fff"}}>{task.name}</div>
              <div style={{fontSize:11,color:"rgba(255,255,255,.75)",marginTop:2}}>{site.name} / {cl?.name||""}</div>
            </div>
            <div style={{padding:"0 14px 14px"}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
                {[{l:"開始日",v:task.start},{l:"終了日",v:task.end}].map(f=>(
                  <div key={f.l} style={{background:"#F8FAFC",borderRadius:9,padding:"9px 11px",border:"1px solid #E2E8F0"}}>
                    <div style={{fontSize:9,color:"#94A3B8",marginBottom:2}}>{f.l}</div>
                    <div style={{fontSize:14,fontWeight:700,color:"#1E293B"}}>{f.v}</div>
                  </div>
                ))}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:10}}>
                {[{l:"期間",v:`${drange(parseD(task.start),parseD(task.end)).length}日`,c:"#64748B"},{l:"稼働日数",v:`${wd}日`,c:"#4F46E5"},{l:"延べ人工",v:`${wd*(+task.workers||1)}人工`,c:"#F97316"}].map(f=>(
                  <div key={f.l} style={{background:"#F8FAFC",borderRadius:9,padding:"9px 5px",border:"1px solid #E2E8F0",textAlign:"center"}}>
                    <div style={{fontSize:9,color:"#94A3B8",marginBottom:2}}>{f.l}</div>
                    <div style={{fontFamily:"'Oswald',sans-serif",fontSize:16,fontWeight:700,color:f.c}}>{f.v}</div>
                  </div>
                ))}
              </div>
              <div style={{background:"#FFF7ED",borderRadius:9,padding:"9px 14px",border:"1px solid #FED7AA",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:12,color:"#92400E"}}>1日あたり予定人数</span>
                <span style={{fontFamily:"'Oswald',sans-serif",fontSize:22,fontWeight:700,color:siteColor(site)}}>{task.workers}<span style={{fontSize:12}}> 人</span></span>
              </div>
              {sl&&<div style={{background:"#EEF2FF",borderRadius:8,padding:"7px 12px",border:"1px solid #C7D2FE",fontSize:12,color:"#4F46E5",marginBottom:8}}>📅 {sl}</div>}
              {task.memo&&<div style={{background:"#F8FAFC",borderRadius:8,padding:"7px 12px",border:"1px solid #E2E8F0",fontSize:12,color:"#64748B",marginBottom:8}}><span style={{fontWeight:700,color:"#94A3B8"}}>備考：</span>{task.memo}</div>}
              {task.note&&<div style={{background:"#FFFBEB",borderRadius:8,padding:"7px 12px",border:"1px solid #FDE68A",fontSize:12,color:"#92400E",marginBottom:10}}><span style={{fontWeight:700}}>特記：</span>{task.note}</div>}

              {/* 日程スライド */}
              <div style={{background:"#F8FAFC",borderRadius:10,padding:"10px 12px",border:"1px solid #E2E8F0",marginBottom:10}}>
                <div style={{fontSize:11,fontWeight:700,color:"#475569",marginBottom:8}}>📅 日程をスライドする</div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {[-7,-3,-1,1,3,7].map(d=>(
                    <button key={d} onClick={()=>{slideTaskDays(task.id,d);setSheet(null);}}
                      style={{flex:1,minWidth:50,background:d<0?"#FEF2F2":"#F0FDF4",border:`1px solid ${d<0?"#FECACA":"#BBF7D0"}`,borderRadius:7,padding:"8px 4px",fontSize:12,color:d<0?"#DC2626":"#16A34A",fontWeight:700,cursor:"pointer"}}>
                      {d>0?`+${d}日`:`${d}日`}
                    </button>
                  ))}
                </div>
                <div style={{fontSize:9,color:"#94A3B8",marginTop:6,textAlign:"center"}}>選択すると開始日・終了日が一括でずれます</div>
              </div>

              {/* 請負予実グラフ */}
              {task.isContract&&task.plannedManDays>0&&(()=>{
                const prog=calcProgress(task,reports,TODAY);
                if(!prog)return null;
                const gapColor=prog.gap>=0?"#16A34A":prog.gap>=-10?"#D97706":"#DC2626";
                return(
                <div style={{background:"#F8FAFC",borderRadius:10,border:"1px solid #E2E8F0",padding:"12px 13px",marginBottom:10}}>
                  <div style={{fontSize:11,fontWeight:700,color:"#475569",marginBottom:10}}>📊 請負工事 予実管理</div>
                  {/* 人工数 */}
                  <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6,marginBottom:10}}>
                    {[{l:"予定人工",v:prog.planned,u:"人工",c:"#3B82F6"},{l:"実績人工",v:prog.actual,u:"人工",c:"#16A34A"},{l:"乖離",v:(prog.gap>=0?"+":"")+prog.gap+"%",u:"",c:gapColor}].map(x=>(
                      <div key={x.l} style={{background:"#fff",borderRadius:8,padding:"8px 5px",textAlign:"center",border:"1px solid #E2E8F0"}}>
                        <div style={{fontSize:9,color:"#94A3B8",marginBottom:2}}>{x.l}</div>
                        <div style={{fontFamily:"'Oswald',sans-serif",fontSize:18,fontWeight:700,color:x.c,lineHeight:1}}>{x.v}<span style={{fontSize:10}}>{x.u}</span></div>
                      </div>
                    ))}
                  </div>
                  {/* 進捗バー */}
                  <div style={{marginBottom:6}}>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#94A3B8",marginBottom:3}}>
                      <span>予定進捗</span><span style={{fontWeight:700,color:"#3B82F6"}}>{prog.plannedPct}%</span>
                    </div>
                    <div style={{height:8,background:"#E2E8F0",borderRadius:4,overflow:"hidden"}}>
                      <div style={{height:"100%",width:`${Math.min(prog.plannedPct,100)}%`,background:"#3B82F6",borderRadius:4}}/>
                    </div>
                  </div>
                  <div style={{marginBottom:4}}>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#94A3B8",marginBottom:3}}>
                      <span>実績進捗</span><span style={{fontWeight:700,color:gapColor}}>{prog.actualPct}%</span>
                    </div>
                    <div style={{height:8,background:"#E2E8F0",borderRadius:4,overflow:"hidden"}}>
                      <div style={{height:"100%",width:`${Math.min(prog.actualPct,100)}%`,background:gapColor,borderRadius:4,transition:"width .5s"}}/>
                    </div>
                  </div>
                  <div style={{textAlign:"center",fontSize:11,fontWeight:700,color:gapColor,marginTop:6,padding:"4px 0",background:`${gapColor}12`,borderRadius:6}}>
                    {prog.gap>=0?`▲ 予定より${prog.gap}%進んでいます`:`▼ 予定より${Math.abs(prog.gap)}%遅れています`}
                  </div>
                  {task.progressNote&&<div style={{fontSize:11,color:"#64748B",marginTop:6,padding:"5px 8px",background:"#FFFBEB",borderRadius:6,border:"1px solid #FDE68A"}}>{task.progressNote}</div>}
                </div>
                );
              })()}

              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>setSheet(null)} style={{flex:1,background:"#F1F5F9",border:"none",borderRadius:10,padding:"12px",color:"#64748B",fontWeight:700,fontSize:14,cursor:"pointer"}}>閉じる</button>
                <button onClick={()=>{setSheet(null);setTimeout(()=>openModal("task","edit",{...task}),50);}} style={{flex:2,background:siteColor(site),border:"none",borderRadius:10,padding:"12px",color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer"}}>✏ 詳細編集</button>
              </div>
            </div>
          </div>
        </div>
      );
    })()}

    {/* ══ ボトムシート：稼働一覧 ══ */}
    {sheet?.type==="avail"&&(()=>{
      const date=sheet.date;
      const list=attOnDay(date);
      return(
        <div onClick={()=>setSheet(null)} style={{position:"fixed",inset:0,background:"rgba(15,23,42,.45)",zIndex:400,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:"16px 16px 0 0",width:"100%",maxWidth:480,maxHeight:"85vh",overflowY:"auto",boxShadow:"0 -8px 30px rgba(0,0,0,.15)"}}>
            <div style={{width:40,height:4,background:"#E2E8F0",borderRadius:2,margin:"12px auto 0"}}/>
            <div style={{padding:"10px 14px 0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{fontSize:15,fontWeight:900,color:"#1E293B"}}>稼働可能作業員 <span style={{fontSize:12,color:"#94A3B8",fontWeight:400}}>— {date.replace(/-/g,"/")} / {list.filter(a=>a.status==="available").length}名</span></div>
              <button onClick={()=>{setSheet(null);openModal("att","add",{workerId:"",workerName:"",company:"",startDate:date,endDate:date,status:"available",note:""}); }}
                style={{background:"#F0FDF4",border:"1px solid #BBF7D0",borderRadius:7,padding:"5px 11px",fontSize:12,color:"#16A34A",fontWeight:700,cursor:"pointer"}}>＋登録</button>
            </div>
            <div style={{padding:"10px 12px 20px"}}>

              :list.map(a=>{
                const cfg=STATUS[a.status]||STATUS.available;
                return(
                  <div key={a.id} className="row" onClick={()=>{setSheet(null);setTimeout(()=>openModal("att","edit",{...a}),50);}}
                    style={{display:"flex",alignItems:"center",gap:9,padding:"10px 8px",borderRadius:8,marginBottom:4,background:"#F8FAFC",border:"1px solid #E2E8F0",cursor:"pointer"}}>
                    <div style={{background:cfg.bg,border:`1px solid ${cfg.border}`,borderRadius:5,padding:"3px 8px",fontSize:11,color:cfg.text,fontWeight:700,flexShrink:0,minWidth:44,textAlign:"center"}}>{cfg.label}</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:700,color:"#1E293B"}}>{a.workerName}</div>
                      <div style={{fontSize:10,color:"#94A3B8"}}>{a.company} / {a.startDate}〜{a.endDate}</div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    })()}

    {/* ══ モーダル ══ */}
    {modal&&(
      <div onClick={closeModal} style={{position:"fixed",inset:0,background:"rgba(15,23,42,.45)",zIndex:500,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
        <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:"16px 16px 0 0",width:"100%",maxWidth:480,maxHeight:"92vh",overflowY:"auto",padding:"8px 16px 32px",boxShadow:"0 -8px 30px rgba(0,0,0,.2)"}}>
          <div style={{width:40,height:4,background:"#E2E8F0",borderRadius:2,margin:"8px auto 14px"}}/>

          {/* 工程 */}
          {modal.type==="task"&&<>
            <MTitle>{modal.mode==="add"?"＋ 工程追加":"✏ 工程編集"}</MTitle>
            <MField label="現場"><select value={form.siteId||sites[0]?.id||""} onChange={e=>setForm({...form,siteId:e.target.value})} style={IS}>{sites.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}</select></MField>
            <MField label="工程名"><input type="text" placeholder="例：基礎工事" value={form.name||""} onChange={e=>setForm({...form,name:e.target.value})} style={IS}/></MField>
            <MField label="開始日"><input type="date" value={form.start||""} onChange={e=>setForm({...form,start:e.target.value})} style={IS}/></MField>
            <MField label="終了日"><input type="date" value={form.end||""} onChange={e=>setForm({...form,end:e.target.value})} style={IS}/></MField>

            {/* 請負工事 予実管理設定 */}
            <MField label="請負工事 予実管理">
              <Chk val={!!form.isContract} onChange={()=>setForm({...form,isContract:!form.isContract})} label="この工程は請負工事" sub="ONにすると予実管理が有効になります" color="#8B5CF6"/>
              {form.isContract&&<>
                <div style={{background:"#F5F3FF",border:"1px solid #DDD6FE",borderRadius:9,padding:"10px 12px",marginTop:4}}>
                  <div style={{marginBottom:8}}>
                    <div style={{fontSize:10,color:"#6D28D9",fontWeight:700,marginBottom:4}}>予定人工数（工期全体）</div>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <input type="number" min={1} placeholder="例：80" value={form.plannedManDays||""} onChange={e=>setForm({...form,plannedManDays:+e.target.value})} style={{...IS,flex:1}}/>
                      <span style={{fontSize:13,color:"#6D28D9",flexShrink:0,fontWeight:700}}>人工</span>
                    </div>
                    {form.plannedManDays>0&&form.start&&form.end&&(()=>{
                      const wd=workDays({...form,workers:+form.workers||1});
                      const perDay=Math.round(form.plannedManDays/wd*10)/10;
                      return<div style={{fontSize:10,color:"#7C3AED",marginTop:3}}>（稼働日あたり約{perDay}人工）</div>;
                    })()}
                  </div>
                  <div>
                    <div style={{fontSize:10,color:"#6D28D9",fontWeight:700,marginBottom:4}}>進捗メモ</div>
                    <input type="text" placeholder="例：2工区完了、3工区着手中" value={form.progressNote||""} onChange={e=>setForm({...form,progressNote:e.target.value})} style={IS}/>
                  </div>
                </div>
                {form.isContract&&form.plannedManDays>0&&(()=>{
                  const prog=calcProgress({...form,workers:+form.workers||1},reports,TODAY);
                  if(!prog)return null;
                  const gapColor=prog.gap>=0?"#16A34A":prog.gap>=-10?"#D97706":"#DC2626";
                  return(
                    <div style={{background:"#fff",border:`1px solid ${gapColor}44`,borderRadius:9,padding:"9px 12px",marginTop:6}}>
                      <div style={{fontSize:10,color:"#94A3B8",marginBottom:6}}>現在の予実プレビュー</div>
                      <div style={{display:"flex",gap:8,marginBottom:6}}>
                        {[{l:"予定進捗",v:`${prog.plannedPct}%`,c:"#3B82F6"},{l:"実績進捗",v:`${prog.actualPct}%`,c:gapColor},{l:"乖離",v:`${prog.gap>=0?"+":""}${prog.gap}%`,c:gapColor}].map(x=>(
                          <div key={x.l} style={{flex:1,textAlign:"center"}}>
                            <div style={{fontSize:8,color:"#94A3B8"}}>{x.l}</div>
                            <div style={{fontFamily:"'Oswald',sans-serif",fontSize:16,fontWeight:700,color:x.c}}>{x.v}</div>
                          </div>
                        ))}
                      </div>
                      <div style={{height:6,background:"#E2E8F0",borderRadius:3,overflow:"hidden",marginBottom:4}}>
                        <div style={{height:"100%",width:`${Math.min(prog.plannedPct,100)}%`,background:"#3B82F6",borderRadius:3}}/>

            <MField label="元請け会社"><select value={form.clientId||clients[0]?.id||""} onChange={e=>setForm({...form,clientId:e.target.value})} style={IS}>{clients.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</select></MField>
            <MField label="現場名"><input type="text" value={form.name||""} onChange={e=>setForm({...form,name:e.target.value})} style={IS}/></MField>
            <MField label="上限人数"><input type="number" min={1} value={form.capacity||4} onChange={e=>setForm({...form,capacity:e.target.value})} style={IS}/></MField>
            <MField label="カラー（元請会社ごとに自動設定）">
              <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:"#F8FAFC",border:"1px solid #E2E8F0",borderRadius:9}}>
                <div style={{width:28,height:28,borderRadius:7,background:clientColorMap[form.clientId]||"#94A3B8",flexShrink:0}}/>
                <div>
                  <div style={{fontSize:12,fontWeight:700,color:"#1E293B"}}>{clients.find(c=>c.id===form.clientId)?.name||"未選択"}</div>
                  <div style={{fontSize:10,color:"#94A3B8"}}>元請会社を変更すると色が自動で変わります</div>
                </div>
              </div>
            </MField>
            <MField label="工事ステータス">
              <Chk val={!!form.completed}
                onChange={()=>setForm({...form,completed:!form.completed})}
                label="完工した工事としてマーク"
                sub="ガントチャートの最下部に移動します"
                color="#94A3B8"/>
            </MField>
            <MBtns onClose={closeModal} onSave={saveSite} saveColor="#F97316"/>
          </>}

          {/* 作業員マスタ */}
          {modal.type==="workerM"&&<>
            <MTitle c="#16A34A">{modal.mode==="add"?"＋ 作業員登録":"✏ 作業員編集"}</MTitle>
            <MField label="氏名"><input type="text" value={form.name||""} onChange={e=>setForm({...form,name:e.target.value})} style={IS}/></MField>
            <MField label="所属会社"><input type="text" value={form.company||""} onChange={e=>setForm({...form,company:e.target.value})} style={IS}/></MField>
            <MField label="備考"><input type="text" value={form.note||""} onChange={e=>setForm({...form,note:e.target.value})} style={IS}/></MField>
            <MBtns onClose={closeModal} onSave={saveWM} onDelete={modal.mode==="edit"?()=>{set("workerMaster",workerMaster.filter(w=>w.id!==form.id));closeModal();}:null} saveColor="#16A34A"/>
          </>}

        </div>
      </div>
    )}

    {/* パスワードモーダル */}
    {pwModal&&<PWModal title={pwModal.title} onSuccess={()=>{admin.login(admin.getStoredPW()||"1234");pwModal.onSuccess();}} onClose={()=>setPWModal(null)}/>}

  </div>
  );
}

// パスワード変更フォーム
function PWChangeForm({onSave}){
  const[oldPW,setOld]=useState("");
  const[newPW,setNew]=useState("");
  return(
    <div>
      <div style={{fontSize:11,color:"#64748B",marginBottom:8}}>パスワードを変更する（現在のパスワードが必要です）</div>
      <input type="password" placeholder="現在のパスワード（4桁）" maxLength={4} value={oldPW} onChange={e=>setOld(e.target.value)} style={{...IS,marginBottom:8}}/>
      <input type="password" placeholder="新しいパスワード（4桁）" maxLength={4} value={newPW} onChange={e=>setNew(e.target.value)} style={{...IS,marginBottom:8}}/>
      <button onClick={()=>{if(oldPW.length===4&&newPW.length===4){onSave(oldPW,newPW);setOld("");setNew("");}}} style={{width:"100%",background:"#4F46E5",border:"none",borderRadius:8,padding:"10px",fontSize:13,color:"#fff",fontWeight:700,cursor:"pointer"}}>パスワードを変更</button>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
