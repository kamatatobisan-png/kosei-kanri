// ─── Utils ───────────────────────────────────────
function isWorkDay(ds,task){
  if(!task)return true;
  const d=parseD(ds),dow=d.getDay();
  if(task.skipWeekend&&(dow===0||dow===6))return false;
  if(task.skipSunday&&dow===0)return false;
  if(task.skipHoliday&&HOLIDAYS.has(ds))return false;
  if(task.skipDates){const sk=task.skipDates.split(",").map(s=>s.trim()).filter(Boolean);if(sk.includes(ds))return false;}
  return true;
}
function workDays(task){
  if(!task||!task.start||!task.end)return 0;
  let c=new Date(task.start+"T00:00:00"),e=new Date(task.end+"T00:00:00"),n=0;
  while(c<=e){if(isWorkDay(fmtD(c),task))n++;c.setDate(c.getDate()+1);}
  return n;
}
// 請負予実計算
function calcProgress(task, reports, today){
  if(!task.isContract||!task.plannedManDays)return null;
  const todayStr=fmtD(today);
  // 実績人工：日報の請負工事から集計
  let actual=0;
  reports.forEach(r=>{
    if(r.siteId!==task.siteId)return;
    if(r.date<task.start||r.date>task.end)return;
    (r.jobTypes||[]).forEach(jt=>{
      if(jt.type==="請負")actual+=(jt.workers||[]).length;
    });
  });
  // 予定進捗率：今日時点での経過稼働日数÷全稼働日数
  const totalWD=workDays(task);
  if(!totalWD)return null;
  let elapsedWD=0;
  const s=parseD(task.start),t2=parseD(Math.min(parseD(todayStr),parseD(task.end)));
  let cur=new Date(s);
  while(cur<=t2){if(isWorkDay(fmtD(cur),task))elapsedWD++;cur.setDate(cur.getDate()+1);}
  const plannedPct=Math.round(elapsedWD/totalWD*100);
  const actualPct=Math.round(actual/task.plannedManDays*100);
  const gap=actualPct-plannedPct; // プラスが進んでいる
  return{actual,planned:task.plannedManDays,totalWD,elapsedWD,plannedPct,actualPct,gap};
}

function skipLabel(t){const p=[];if(t.skipWeekend)p.push("土日除く");else if(t.skipSunday)p.push("日曜除く");if(t.skipHoliday)p.push("祝日除く");if(t.skipDates){const n=t.skipDates.split(",").filter(s=>s.trim()).length;if(n)p.push(`特定日${n}件`);}return p.join(" / ");}
function drange(s,e){const a=[];let c=new Date(s);while(c<=new Date(e)){a.push(new Date(c));c.setDate(c.getDate()+1);}return a;}
function nowStr(){const n=new Date();return`${n.getFullYear()}-${Z(n.getMonth()+1)}-${Z(n.getDate())} ${Z(n.getHours())}:${Z(n.getMinutes())}`;}
function addDays(ds,n){const d=parseD(ds);d.setDate(d.getDate()+n);return fmtD(d);}
function dlCSV(fn,rows){const b="\uFEFF"+rows.map(r=>r.map(c=>`"${String(c??"").replace(/"/g,'""')}"`).join(",")).join("\n");const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([b],{type:"text/csv;charset=utf-8"}));a.download=fn;a.click();}

// ─── 日付の種別 ──────────────────────────────────
function dayType(ds){
  const d=parseD(ds),dow=d.getDay();
  if(HOLIDAYS.has(ds))return"holiday";
  if(dow===0)return"sun";
  if(dow===6)return"sat";
  return"weekday";
}
function dayColor(ds,isToday,isSel){
  if(isSel)return"#fff";
  if(isToday)return"#FCD34D";
  const t=dayType(ds);
  if(t==="holiday")return"#F0ABFC";
  if(t==="sun")return"#F87171";
  if(t==="sat")return"#93C5FD";
  return"#CBD5E1";
}
function dayBg(ds,isToday,isSel){
  if(isSel)return"#F97316";
  if(isToday)return"rgba(249,115,22,.25)";
  const t=dayType(ds);
  if(t==="holiday")return"rgba(192,38,211,.08)";
  if(t==="sun")return"rgba(239,68,68,.06)";
  if(t==="sat")return"rgba(59,130,246,.06)";
  return"#1E293B";
}

// ─── ストア ───────────────────────────────────────
const LS="kms_v2";
function useStore(){
  const load=()=>{try{const s=localStorage.getItem(LS);if(s)return JSON.parse(s);}catch(_){}return SEED;};
  const[store,_set]=useState(load);
  const[syncing,setSyncing]=useState(false);
  const[syncErr,setSyncErr]=useState(null);
  const[synced,setSynced]=useState(false);
  const[lastSync,setLastSync]=useState(null);
  const setStore=useCallback(fn=>{_set(prev=>{const next=typeof fn==="function"?fn(prev):fn;try{localStorage.setItem(LS,JSON.stringify(next));}catch(_){}return next;});},[]);
  const pull=useCallback(async()=>{
    if(!gasOK())return;
    setSyncing(true);setSyncErr(null);
    try{const d=await gasGet("getAll");if(d&&Object.keys(d).length){setStore(p=>({...p,...d}));setSynced(true);setLastSync(nowStr());}}
    catch(e){setSyncErr(e.message);}
    finally{setSyncing(false);}
  },[]);
  const push=useCallback(async(key,val)=>{
    if(!gasOK())return;
    const MAP={clients:"saveClients",sites:"saveSites",tasks:"saveTasks",workerMaster:"saveWorkerMaster",attendance:"saveAttendance",reports:"saveReports"};
    try{await gasPost(MAP[key]||"saveAll",val);setLastSync(nowStr());}catch(e){setSyncErr(e.message);}
  },[]);
  useEffect(()=>{pull();},[]);
  const get=k=>store[k]||[];
  const set=(k,v)=>{setStore(p=>({...p,[k]:v}));push(k,v);};
  return{get,set,store,pull,syncing,syncErr,synced,lastSync,setStore};
}

// ─── 管理者パスワード ─────────────────────────────
function useAdmin(){
  const[isAdmin,setIsAdmin]=useState(false);
  const getStoredPW=()=>localStorage.getItem(ADMIN_PW_KEY)||"1234";
  const login=(pw)=>{if(pw===getStoredPW()){setIsAdmin(true);return true;}return false;};
  const logout=()=>setIsAdmin(false);
  const changePW=(oldPW,newPW)=>{if(oldPW!==getStoredPW())return false;localStorage.setItem(ADMIN_PW_KEY,newPW);return true;};
  return{isAdmin,login,logout,changePW,getStoredPW};
}

              if(k==="⌫"){setPW(p=>p.slice(0,-1));setErr(false);}
              else if(k&&pw.length<4){const np=pw+k;setPW(np);setErr(false);if(np.length===4)setTimeout(()=>{if(admin.login(np)){onSuccess();}else{setErr(true);setPW("");}},80);}
            }} style={{background:k?"#F8FAFC":"transparent",border:k?"1px solid #E2E8F0":"none",borderRadius:9,padding:"13px 0",fontSize:16,fontWeight:700,color:"#1E293B",cursor:k?"pointer":"default"}}>
              {k}
            </button>
          ))}
        </div>
        <button onClick={onClose} style={{width:"100%",background:"#F1F5F9",border:"none",borderRadius:9,padding:"10px",fontSize:13,color:"#64748B",cursor:"pointer",fontWeight:700}}>キャンセル</button>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════
//  APP本体
// ══════════════════════════════════════════════════
function App(){
  const TODAY=new Date();
  const VIEW_S=new Date(TODAY.getFullYear(), TODAY.getMonth()-1, 1);
  const VIEW_E=new Date(TODAY.getFullYear(), TODAY.getMonth()+4, 0);
  const days=useMemo(()=>drange(VIEW_S,VIEW_E),[]);
  const todayIdx=useMemo(()=>days.findIndex(d=>fmtD(d)===fmtD(TODAY)),[days]);

  const{get,set,store,pull,syncing,syncErr,synced,lastSync,setStore}=useStore();
  const admin=useAdmin();
  const{w:winW}=useWindowSize();
  const isPortrait=winW<600; // 縦向き判定（600px未満を縦向きとみなす）
  const[tab,setTab]=useState("gantt");
  const[sel,setSel]=useState(fmtD(TODAY));
  const[modal,setModal]=useState(null);
  const[form,setForm]=useState({});
  const[sheet,setSheet]=useState(null);
  const[ganttFull,setGanttFull]=useState(false);
  const[mY,setMY]=useState(()=>new Date().getFullYear());
  const[mM,setMM]=useState(()=>new Date().getMonth()+1);
  const[pwModal,setPWModal]=useState(null); // {title,onSuccess}
  const[slideTask,setSlideTask]=useState(null); // 日程スライド対象

  const clients     =get("clients");
  const sites       =get("sites");
  const tasks       =get("tasks");
  const workerMaster=get("workerMaster");
  const attendance  =get("attendance");
  const reports     =get("reports");

  // ─── ガントスクロール同期 ─────────────────────
  const hRef=useRef(null),bRef=useRef(null),lRef=useRef(null);
  const lockH=useRef(false),lockV=useRef(false);
  useEffect(()=>{
    const off=Math.max(0,todayIdx*DW-80);
    if(hRef.current)hRef.current.scrollLeft=off;
    if(bRef.current)bRef.current.scrollLeft=off;
  },[todayIdx]);
  const onScrollH=()=>{if(lockH.current)return;lockH.current=true;if(bRef.current)bRef.current.scrollLeft=hRef.current.scrollLeft;requestAnimationFrame(()=>lockH.current=false);};
  const onScrollB=()=>{
    if(!lockH.current){lockH.current=true;if(hRef.current)hRef.current.scrollLeft=bRef.current.scrollLeft;requestAnimationFrame(()=>lockH.current=false);}
    if(!lockV.current){lockV.current=true;if(lRef.current)lRef.current.scrollTop=bRef.current.scrollTop;requestAnimationFrame(()=>lockV.current=false);}
  };
  const onScrollL=()=>{if(lockV.current)return;lockV.current=true;if(bRef.current)bRef.current.scrollTop=lRef.current.scrollTop;requestAnimationFrame(()=>lockV.current=false);};

  // ─── 計算 ─────────────────────────────────────
  const reqOnDay=date=>tasks.filter(t=>date>=t.start&&date<=t.end&&isWorkDay(date,t)).reduce((s,t)=>s+t.workers,0);
  const reqBySite=(sid,date)=>{const t=tasks.find(t=>t.siteId===sid&&date>=t.start&&date<=t.end);return(t&&isWorkDay(date,t))?t.workers:0;};

  // attendance は期間管理：その日に有効なレコードを返す
  const attOnDay=date=>attendance.filter(a=>{
    if(date<a.startDate||date>a.endDate)return false;
    return isWorkDay(date,{skipWeekend:a.skipWeekend,skipSunday:a.skipSunday,skipHoliday:a.skipHoliday,skipDates:a.skipDates});
  });
  const availOnDay=date=>attOnDay(date).filter(a=>a.status==="available").length;
  const sigOnDay=date=>{const r=reqOnDay(date),a=availOnDay(date);return!r?null:a>r?"over":a===r?"just":"lack";};
  const sigColor=s=>!s?"#94A3B8":s==="over"?SIG.over:s==="just"?SIG.just:SIG.lack;

  // ガントバー分割
  const barSegs=task=>{
    const si=days.findIndex(d=>fmtD(d)===task.start);
    const ei=days.findIndex(d=>fmtD(d)===task.end);
    if(si<0||ei<0)return[];
    const segs=[];let ss=null,sk=null;
    for(let i=si;i<=ei;i++){
      const s=!isWorkDay(fmtD(days[i]),task);
      if(ss===null){ss=i;sk=s;}
      else if(s!==sk){segs.push({left:ss*DW+2,width:(i-ss)*DW-2,skip:sk,startI:ss});ss=i;sk=s;}
    }
    if(ss!==null)segs.push({left:ss*DW+2,width:(ei-ss+1)*DW-4,skip:sk,startI:ss});
    return segs;
  };

  // ─── CRUD ─────────────────────────────────────
  const openModal=(type,mode,data={})=>{setForm({...data});setModal({type,mode});};
  const closeModal=()=>setModal(null);

  const saveTask=()=>{
    if(!form.name||!form.start||!form.end)return;
    const e={...form,workers:+form.workers||1};
    if(modal.mode==="add")set("tasks",[...tasks,{...e,id:uid()}]);
    else set("tasks",tasks.map(t=>t.id===e.id?e:t));
    closeModal();
  };
  const delTask=id=>{set("tasks",tasks.filter(t=>t.id!==id));closeModal();};

  // 工程スライド（日程を±N日ずらす）
  const slideTaskDays=(taskId,delta)=>{
    set("tasks",tasks.map(t=>{
      if(t.id!==taskId)return t;
      return{...t,start:addDays(t.start,delta),end:addDays(t.end,delta)};
    }));
  };

  const saveAtt=()=>{
    if(!form.workerName||!form.company||!form.startDate)return;
    const e={...form,endDate:form.endDate||form.startDate};
    if(modal.mode==="add")set("attendance",[...attendance,{...e,id:uid()}]);
    else set("attendance",attendance.map(a=>a.id===e.id?e:a));
    closeModal();
  };
  const delAtt=id=>{set("attendance",attendance.filter(a=>a.id!==id));closeModal();};

  const saveReport=(allowEdit=false)=>{
    if(!form.date||!form.siteId)return;
    const e={...form,safety:!!form.safety,locked:!allowEdit};
    // 新しい作業員をマスタに自動追加
    const newWorkers=(form.workers||[]).filter(w=>w.name&&w.company&&!workerMaster.find(m=>m.name===w.name));
    if(newWorkers.length>0){
      const newMaster=[...workerMaster,...newWorkers.map(w=>({id:uid(),name:w.name,company:w.company,note:""}))];
      set("workerMaster",newMaster);
    }
    if(modal.mode==="add")set("reports",[...reports,{...e,id:uid()}]);
    else set("reports",reports.map(r=>r.id===e.id?e:r));
    closeModal();
  };
  const delReport=(id,isAdmin)=>{
    if(!isAdmin){setPWModal({title:"日報の削除には管理者権限が必要です",onSuccess:()=>{set("reports",reports.filter(r=>r.id!==id));closeModal();setPWModal(null);}});return;}
    set("reports",reports.filter(r=>r.id!==id));closeModal();
  };

  const saveClient=()=>{if(!form.name)return;if(modal.mode==="add")set("clients",[...clients,{...form,id:uid()}]);else set("clients",clients.map(c=>c.id===form.id?form:c));closeModal();};
  const saveSite=()=>{if(!form.name)return;const e={...form,clientId:form.clientId,capacity:+form.capacity||4};if(modal.mode==="add")set("sites",[...sites,{...e,id:uid(),color:e.color||COLORS[sites.length%COLORS.length]}]);else set("sites",sites.map(s=>s.id===e.id?e:s));closeModal();};
  const saveWM=()=>{if(!form.name||!form.company)return;if(modal.mode==="add")set("workerMaster",[...workerMaster,{...form,id:uid()}]);else set("workerMaster",workerMaster.map(w=>w.id===form.id?form:w));closeModal();};

  // ─── 月次集計 ─────────────────────────────────
  const mPfx=`${mY}-${Z(mM)}`;
  const mReports=useMemo(()=>reports.filter(r=>r.date?.startsWith(mPfx)),[reports,mPfx]);
  const mAtt=useMemo(()=>{
    const list=[];
    attendance.forEach(a=>{
      const s=parseD(a.startDate),e=parseD(a.endDate);
      let c=new Date(s);
      while(c<=e){
        const ds=fmtD(c);
        if(ds.startsWith(mPfx)&&isWorkDay(ds,{skipWeekend:a.skipWeekend,skipSunday:a.skipSunday,skipHoliday:a.skipHoliday,skipDates:a.skipDates})&&a.status==="available"){
          list.push({...a,date:ds});
        }
        c.setDate(c.getDate()+1);
      }
    });
    return list;
  },[attendance,mPfx]);

  const byClient=useMemo(()=>{const m={};mReports.forEach(r=>{const site=sites.find(s=>s.id===r.siteId);const cl=site?clients.find(c=>c.id===site.clientId):null;const k=r.clientName||cl?.name||"不明";if(!m[k])m[k]={name:k,cnt:0,workers:0,days:new Set()};m[k].cnt++;m[k].workers+=r.totalWorkers||0;m[k].days.add(r.date);});return Object.values(m).map(x=>({...x,dayCnt:x.days.size})).sort((a,b)=>b.cnt-a.cnt);},[mReports,sites,clients]);
  const bySite=useMemo(()=>{const m={};mReports.forEach(r=>{const site=sites.find(s=>s.id===r.siteId);const k=r.siteId;if(!m[k])m[k]={id:k,name:site?.name||"不明",color:site?.color||"#94A3B8",cnt:0,workers:0,days:new Set()};m[k].cnt++;m[k].workers+=r.totalWorkers||0;m[k].days.add(r.date);});return Object.values(m).map(x=>({...x,dayCnt:x.days.size})).sort((a,b)=>b.cnt-a.cnt);},[mReports,sites]);
  const byCompany=useMemo(()=>{const m={};mAtt.forEach(a=>{if(!m[a.company])m[a.company]={co:a.company,workers:new Set(),days:0};m[a.company].workers.add(a.workerName);m[a.company].days++;});return Object.values(m).map(x=>({...x,wCnt:x.workers.size})).sort((a,b)=>b.days-a.days);},[mAtt]);
  const byWorker=useMemo(()=>{const m={};mAtt.forEach(a=>{if(!m[a.workerName])m[a.workerName]={name:a.workerName,co:a.company,days:new Set()};m[a.workerName].days.add(a.date);});return Object.values(m).map(x=>({...x,cnt:x.days.size,dl:[...x.days].sort()})).sort((a,b)=>b.cnt-a.cnt);},[mAtt]);
  const mAbsent=useMemo(()=>{const list=[];mReports.forEach(r=>{(r.absentees||[]).forEach(ab=>{list.push({date:r.date,site:sites.find(s=>s.id===r.siteId)?.name||"",name:ab.name});});});return list.sort((a,b)=>b.date.localeCompare(a.date));},[mReports,sites]);

  // 月次：現場毎の常用/請負人数
  const bySiteJobType=useMemo(()=>{
    const m={};
    mReports.forEach(r=>{
      const site=sites.find(s=>s.id===r.siteId);
      const k=r.siteId;
      if(!m[k])m[k]={siteId:k,name:site?.name||"不明",color:site?.color||"#94A3B8",regular:0,contract:0};
      (r.jobTypes||[]).forEach(jt=>{
        const cnt=(jt.workers||[]).length;
        if(jt.type==="常用")m[k].regular+=cnt;
        else m[k].contract+=cnt;
      });
    });
    return Object.values(m);
  },[mReports,sites]);

  // 月次：現場毎の搬出入車両
  const bySiteVehicle=useMemo(()=>{
    const m={};
    mReports.forEach(r=>{
      const site=sites.find(s=>s.id===r.siteId);
      const k=r.siteId;
      if(!m[k])m[k]={siteId:k,name:site?.name||"不明",color:site?.color||"#94A3B8",vehicles:{}};
      (r.vehicles||[]).forEach(v=>{
        const key=`${v.contractType}_${v.size}`;
        m[k].vehicles[key]=(m[k].vehicles[key]||0)+1;
      });
    });
    return Object.values(m);
  },[mReports,sites]);

  // 月次：作業員別遅刻日数
  const byWorkerLate=useMemo(()=>{
    const m={};
    mReports.forEach(r=>{
      (r.latecomers||[]).forEach(l=>{
        if(!m[l.name])m[l.name]={name:l.name,cnt:0,dates:[]};
        m[l.name].cnt++;
        m[l.name].dates.push(r.date);
      });
    });
    return Object.values(m).sort((a,b)=>b.cnt-a.cnt);
  },[mReports]);

  // 月次：現場毎インシデント一覧
  // 月次：請負工事予実（全期間、月フィルタなし）
  const contractProgress=useMemo(()=>{
    return tasks
      .filter(t=>t.isContract&&t.plannedManDays>0)
      .map(t=>{
        const site=sites.find(s=>s.id===t.siteId);
        const p=calcProgress(t,reports,TODAY);
        return{task:t,site,progress:p};
      })
      .filter(x=>x.progress);
  },[tasks,sites,reports]);

  const bySiteIncident=useMemo(()=>{
    const m={};
    mReports.filter(r=>r.incident).forEach(r=>{
      const site=sites.find(s=>s.id===r.siteId);
      const k=r.siteId;
      if(!m[k])m[k]={siteId:k,name:site?.name||"不明",color:site?.color||"#94A3B8",incidents:[]};
      m[k].incidents.push({date:r.date,text:r.incident});
    });
    return Object.values(m);
  },[mReports,sites]);

  // 選択日集計
  const selAtt=attOnDay(sel);
  const selAvail=selAtt.filter(a=>a.status==="available").length;
  const selReq=reqOnDay(sel);
  const selShort=Math.max(0,selReq-selAvail);
  const selSig=sigOnDay(sel);
  const selObj=parseD(sel);
  const isWE=selObj.getDay()===0||selObj.getDay()===6;
  const isHoliday=HOLIDAYS.has(sel);

  // 日報新規作成時：選択日の工程から自動入力
  const buildReportDefault=(date)=>{
    const dayTasks=tasks.filter(t=>date>=t.start&&date<=t.end&&isWorkDay(date,t));
    const firstTask=dayTasks[0];
    const site=firstTask?sites.find(s=>s.id===firstTask.siteId):null;
    const cl=site?clients.find(c=>c.id===site.clientId):null;
    const dayWorkers=attOnDay(date).filter(a=>a.status==="available").map(a=>({name:a.workerName,company:a.company}));
    return{
      date,
      siteId:firstTask?.siteId||sites[0]?.id||"",
      clientName:cl?.name||"",
      workers:dayWorkers,
      totalWorkers:dayWorkers.length,
      weather:"晴れ",
      jobTypes:[{type:"常用",workers:dayWorkers,work:firstTask?firstTask.name:"",overtime:false,overtimeDetails:[]}],
      latecomers:[],
      vehicles:[],
      highway:"",parking:false,parkingFee:0,gas:0,otherExpense:"",
      absentees:[],safety:true,incident:"",by:"",
      locked:false,
    };
  };

  // ─── レンダリング ─────────────────────────────
  return(
  <div style={{height:"100%",display:"flex",flexDirection:"column",background:"#F1F5F9"}}>

    {/* HEADER */}
    <div style={{background:"#1E293B",padding:"6px 12px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <div style={{width:3,height:26,background:"#F97316",borderRadius:2}}/>
        <div>
          <div style={{fontFamily:"'Oswald',sans-serif",fontSize:13,color:"#F97316",letterSpacing:".10em"}}>工程管理システム</div>
          <div style={{fontSize:9,color:"#475569"}}>CONSTRUCTION MANAGEMENT</div>
        </div>
      </div>
      <div style={{display:"flex",gap:8,alignItems:"center"}}>
        <div style={{background:"#FFF7ED",border:"1px solid #FED7AA",borderRadius:6,padding:"5px 11px",fontSize:13,color:"#EA580C",fontWeight:700}}>{fmtD(TODAY)}（{DOW[TODAY.getDay()]}）</div>
        {admin.isAdmin&&<div style={{background:"#F0FDF4",border:"1px solid #BBF7D0",borderRadius:5,padding:"2px 7px",fontSize:10,color:"#16A34A",fontWeight:700}}>管理者</div>}
        <button onClick={pull} style={{background:"#334155",border:"none",borderRadius:6,padding:"4px 9px",fontSize:11,color:"#94A3B8",cursor:"pointer"}}>{syncing?"⟳":"↻"}</button>
      </div>
    </div>

    {/* 同期バー */}
    {(syncErr||synced||!gasOK())&&(
      <div style={{background:syncErr?"#FEF2F2":gasOK()?"#F0FDF4":"#FFFBEB",borderBottom:`1px solid ${syncErr?"#FECACA":gasOK()?"#BBF7D0":"#FDE68A"}`,padding:"3px 14px",fontSize:10,color:syncErr?"#DC2626":gasOK()?"#16A34A":"#B45309",display:"flex",justifyContent:"space-between"}}>
        <span>{syncErr?`✗ ${syncErr}`:gasOK()?"✓ スプレッドシート連携中":"⚠ オフラインモード（GAS未設定）"}</span>
        {lastSync&&<span style={{color:"#94A3B8"}}>最終同期 {lastSync}</span>}
      </div>
    )}

    {/* TABS */}
    <div style={{background:"#fff",borderBottom:"1px solid #E2E8F0",display:"flex",flexShrink:0}}>
      {TABS.map(t=>(
        <button key={t.id} onClick={()=>setTab(t.id)}
          style={{flex:1,background:tab===t.id?"#FFF7ED":"transparent",border:"none",borderBottom:tab===t.id?"2px solid #F97316":"2px solid transparent",padding:"6px 2px 5px",color:tab===t.id?"#F97316":"#94A3B8",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:0}}>
          <span style={{fontSize:20}}>{t.icon}</span>
          <span style={{fontSize:10,fontWeight:700}}>{t.label}</span>
        </button>
      ))}
    </div>

    <div style={{flex:1,overflow:"hidden",minHeight:0}}>

    {/* ══ ガントチャート ══ */}
    {tab==="gantt"&&(
      <div style={{display:"flex",flexDirection:isPortrait?"column":"row",height:"100%",overflow:"hidden",position:"relative"}}>
        {/* ガント本体 */}
        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",minHeight:isPortrait?"55%":undefined}}>

          {/* 日付ヘッダー */}
          <div style={{display:"flex",background:"#1E293B",flexShrink:0}}>
            <div style={{width:LW,flexShrink:0,borderRight:"1px solid #334155",padding:"5px 8px",display:"flex",flexDirection:"column",justifyContent:"flex-end",gap:2}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:9,color:"#64748B"}}>現場 / 工程</span>
                <button onClick={()=>setGanttFull(f=>!f)}
                  style={{background:"rgba(249,115,22,.15)",border:"1px solid rgba(249,115,22,.3)",borderRadius:5,padding:"2px 7px",fontSize:9,color:"#FB923C",fontWeight:700,cursor:"pointer",flexShrink:0}}>
                  {ganttFull?(isPortrait?"▼ 戻す":"◀ 戻す"):(isPortrait?"▲ 全画面":"▶ 全画面")}
                </button>
              </div>
              <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                {[["#16A34A","余裕"],["#D97706","ぴったり"],["#DC2626","不足"],["#F0ABFC","祝日"],["#93C5FD","土"],["#F87171","日"]].map(([c,l])=>(
                  <div key={l} style={{display:"flex",alignItems:"center",gap:2}}>
                    <div style={{width:6,height:6,borderRadius:1,background:c}}/>
                    <span style={{fontSize:7,color:"#64748B"}}>{l}</span>
                  </div>
                ))}
              </div>
            </div>
            <div ref={hRef} style={{flex:1,overflowX:"auto",overflowY:"hidden"}} onScroll={onScrollH}>
              <div style={{display:"flex",width:days.length*DW}}>
                {days.map((d,i)=>{
                  const ds=fmtD(d),isT=ds===fmtD(TODAY),isS=ds===sel;
                  const req=reqOnDay(ds),avl=availOnDay(ds),sh=Math.max(0,req-avl);
                  const sig=sigOnDay(ds);
                  const fillH=req>0?Math.min(100,Math.round((avl/req)*100)):0;
                  const txtC=dayColor(ds,isT,isS);
                  const bgC=dayBg(ds,isT,isS);
                  return(
                    <div key={i} onClick={()=>setSel(ds)}
                      style={{width:DW,flexShrink:0,textAlign:"center",padding:"2px 0 0",borderRight:"1px solid #334155",background:bgC,position:"relative",overflow:"hidden",cursor:"pointer",
                        ...(isT?{boxShadow:"inset 0 0 0 2px #F97316"}:{})}}>
                      {/* 今日ラベル */}
                      {isT&&!isS&&<div style={{position:"absolute",top:0,left:0,right:0,height:3,background:"#F97316"}}/>}
                      {/* 充足バー */}
                      {req>0&&!isS&&<div style={{position:"absolute",bottom:0,left:0,right:0,height:`${fillH}%`,background:sigColor(sig),opacity:.22,pointerEvents:"none"}}/>}
                      <div style={{position:"relative",zIndex:1}}>
                        {isT&&!isS&&<div style={{fontSize:7,color:"#F97316",fontWeight:900,lineHeight:1}}>TODAY</div>}
                        <div style={{fontSize:9,color:isS?"rgba(255,255,255,.8)":HOLIDAYS.has(ds)?"#C026D3":txtC==="#F87171"?"#EF4444":txtC==="#93C5FD"?"#3B82F6":"#475569"}}>{DOW[d.getDay()]}{HOLIDAYS.has(ds)?"🎌":""}</div>
                        <div style={{fontSize:isT?17:15,fontWeight:900,lineHeight:1.1,color:txtC,textShadow:isT&&!isS?"0 0 8px rgba(249,115,22,.6)":"none"}}>{d.getDate()}</div>
                        <div style={{fontSize:9,fontWeight:700,lineHeight:1,marginTop:1,color:isS?"rgba(255,255,255,.9)":req>0?sigColor(sig):"#334155"}}>
                          {req>0?(sh>0?`▼${sh}`:avl>req?`✓`:req+"人"):"─"}
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>

          {/* バーエリア */}
          <div style={{flex:1,display:"flex",overflow:"hidden"}}>
            <div ref={lRef} style={{width:LW,flexShrink:0,overflowY:"auto",overflowX:"hidden",background:"#fff",borderRight:"2px solid #E2E8F0"}} onScroll={onScrollL}>
              {sites.map((s,si)=>{
                const cl=clients.find(c=>c.id===s.clientId);
                const req=reqBySite(s.id,sel);
                return(

          </div>
          <div style={{background:"#fff",borderRadius:10,padding:"10px 13px",marginBottom:12,border:"1px solid #E2E8F0",display:"flex",gap:12,alignItems:"center"}}>
            {[{l:"必要",v:selReq,c:"#3B82F6"},{l:"稼働可能",v:selAvail,c:"#16A34A"},{l:"不足",v:selShort,c:"#DC2626"}].map(b=>(
              <div key={b.l} style={{textAlign:"center",flex:1}}>
                <div style={{fontSize:9,color:"#94A3B8"}}>{b.l}</div>

              </div>

          </div>
          <div style={{background:"#fff",borderRadius:10,overflow:"hidden",border:"1px solid #E2E8F0",marginBottom:12}}>
            <div style={{background:"#F8FAFC",padding:"8px 12px",fontSize:10,color:"#64748B",fontWeight:700,borderBottom:"1px solid #E2E8F0"}}>{sel.replace(/-/g,"/")} の稼働状況（{selAtt.length}名）</div>
            {selAtt.length===0?<div style={{textAlign:"center",color:"#CBD5E1",padding:"20px",fontSize:12}}>登録なし</div>

                  <div style={{background:cfg.bg,border:`1px solid ${cfg.border}`,borderRadius:5,padding:"3px 8px",fontSize:11,color:cfg.text,fontWeight:700,flexShrink:0,minWidth:44,textAlign:"center"}}>{cfg.label}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:700,color:"#1E293B"}}>{a.workerName}</div>
                    <div style={{fontSize:10,color:"#94A3B8"}}>{a.company} / {a.startDate}〜{a.endDate}{skipLabel(a)?` (${skipLabel(a)})`:""}{a.note?` — ${a.note}`:""}</div>
                  </div>
                  <span style={{fontSize:10,color:"#CBD5E1"}}>▶</span>
                </div>
              );
            })}
          </div>
          {workerMaster.filter(wm=>!selAtt.find(a=>a.workerId===wm.id)).length>0&&(
            <div style={{background:"#fff",borderRadius:10,border:"1px solid #E2E8F0",overflow:"hidden",marginBottom:12}}>
              <div style={{background:"#F8FAFC",padding:"8px 12px",fontSize:10,color:"#64748B",fontWeight:700,borderBottom:"1px solid #E2E8F0"}}>マスタから登録</div>
              {workerMaster.filter(wm=>!selAtt.find(a=>a.workerId===wm.id)).map(wm=>(
                <div key={wm.id} className="row" onClick={()=>openModal("att","add",{workerId:wm.id,workerName:wm.name,company:wm.company,startDate:sel,endDate:sel,status:"available",note:""})}
                  style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"9px 12px",borderBottom:"1px solid #F1F5F9",cursor:"pointer",background:"#fff"}}>
                  <div><div style={{fontSize:12,fontWeight:700,color:"#1E293B"}}>{wm.name}</div><div style={{fontSize:10,color:"#94A3B8"}}>{wm.company}</div></div>
                  <div style={{background:"#F0FDF4",border:"1px solid #BBF7D0",borderRadius:5,padding:"3px 9px",fontSize:11,color:"#16A34A",fontWeight:700}}>＋登録</div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    )}

    {/* ══ 日報 ══ */}
    {tab==="report"&&(
      <div style={{height:"100%",overflowY:"auto",padding:12}}>
        <div style={{maxWidth:700,margin:"0 auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{fontFamily:"'Oswald',sans-serif",fontSize:18,color:"#4F46E5",letterSpacing:".06em"}}>作業日報</div>
            <button onClick={()=>openModal("report","add",buildReportDefault(sel))}
              style={{background:"#4F46E5",border:"none",borderRadius:8,padding:"7px 14px",fontSize:12,color:"#fff",fontWeight:700,cursor:"pointer"}}>＋ 日報作成</button>
          </div>
          <div style={{background:"#fff",borderRadius:9,padding:"9px 12px",marginBottom:12,border:"1px solid #E2E8F0",display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:11,color:"#64748B",fontWeight:700}}>対象日</span>
            <input type="date" value={sel} onChange={e=>setSel(e.target.value)} style={{...IS,width:"auto",padding:"5px 9px",fontSize:13}}/>
            <span style={{fontSize:11,color:"#94A3B8"}}>{reports.filter(r=>r.date===sel).length}件</span>
          </div>
          {reports.filter(r=>r.date===sel).length===0
            ?<div style={{textAlign:"center",color:"#CBD5E1",padding:"36px 0",fontSize:13}}>この日の日報はありません</div>
            :reports.filter(r=>r.date===sel).map(rp=>{
              const site=sites.find(s=>s.id===rp.siteId);
              const cl=site?clients.find(c=>c.id===site.clientId):null;
              const RF=({label,value,warn})=>(
                <div style={{display:"flex",borderBottom:"1px solid #F1F5F9",padding:"6px 0"}}>
                  <div style={{width:80,fontSize:10,color:"#94A3B8",fontWeight:700,flexShrink:0,paddingTop:1}}>{label}</div>
                  <div style={{flex:1,fontSize:12,color:warn?"#DC2626":"#1E293B",lineHeight:1.6}}>{value||<span style={{color:"#E2E8F0"}}>─</span>}</div>
                </div>
              );
              return(
                <div key={rp.id} style={{background:"#fff",borderRadius:12,marginBottom:14,overflow:"hidden",border:"1px solid #E2E8F0",boxShadow:"0 2px 8px rgba(0,0,0,.06)"}}>
                  <div style={{background:site?.color||"#4F46E5",padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:6}}>
                    <div>
                      <div style={{fontSize:15,fontWeight:900,color:"#fff"}}>{site?.name||"現場不明"}</div>
                      <div style={{fontSize:10,color:"rgba(255,255,255,.7)"}}>{rp.clientName||cl?.name||""} / {rp.date} / {rp.weather}</div>
                    </div>
                    <div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center"}}>
                      <span style={{background:rp.safety?"rgba(16,185,129,.3)":"rgba(239,68,68,.3)",borderRadius:5,padding:"3px 8px",fontSize:11,color:rp.safety?"#34D399":"#FCA5A5",fontWeight:700}}>{rp.safety?"✓ 安全OK":"✗ 要確認"}</span>
                      {rp.locked&&!admin.isAdmin
                        ?<button onClick={()=>setPWModal({title:"日報を編集するには管理者権限が必要です",onSuccess:()=>{setPWModal(null);openModal("report","edit",{...rp,workers:rp.workers||[],overtimeDetails:rp.overtimeDetails||[],absentees:rp.absentees||[]});}})} style={{background:"rgba(255,255,255,.15)",border:"none",borderRadius:5,padding:"3px 8px",fontSize:11,color:"rgba(255,255,255,.7)",cursor:"pointer"}}>🔐 修正</button>
                        :<button onClick={()=>openModal("report","edit",{...rp,workers:rp.workers||[],overtimeDetails:rp.overtimeDetails||[],absentees:rp.absentees||[]})} style={{background:"rgba(255,255,255,.2)",border:"none",borderRadius:5,padding:"3px 8px",fontSize:11,color:"#fff",cursor:"pointer"}}>編集</button>}
                    </div>
                  </div>
                  <div style={{padding:"4px 14px 10px"}}>
                    {/* 工事種別ごとの作業員・作業内容・残業 */}
                    {(rp.jobTypes||[]).length>0&&(rp.jobTypes||[]).map((jt,ji)=>(
                      <div key={ji} style={{borderBottom:"1px solid #F1F5F9",padding:"6px 0"}}>
                        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
                          <span style={{background:jt.type==="常用"?"#EFF6FF":"#F0FDF4",border:`1px solid ${jt.type==="常用"?"#BFDBFE":"#BBF7D0"}`,borderRadius:5,padding:"1px 8px",fontSize:11,fontWeight:700,color:jt.type==="常用"?"#2563EB":"#16A34A"}}>{jt.type}</span>
                          <span style={{fontSize:10,color:"#94A3B8"}}>{(jt.workers||[]).length}名</span>
                          {jt.overtime&&<span style={{background:"#FFFBEB",border:"1px solid #FDE68A",borderRadius:5,padding:"1px 7px",fontSize:10,color:"#B45309"}}>残業あり</span>}
                        </div>
                        <div style={{display:"flex",flexWrap:"wrap",gap:3,marginBottom:3}}>
                          {(jt.workers||[]).map((w,i)=><span key={i} style={{background:"#F8FAFC",border:"1px solid #E2E8F0",borderRadius:4,padding:"1px 6px",fontSize:10,color:"#475569"}}>{w.name}<span style={{color:"#94A3B8",fontSize:9,marginLeft:2}}>{w.company}</span></span>)}
                        </div>
                        {jt.work&&<div style={{fontSize:11,color:"#475569",paddingLeft:2}}>{jt.work}</div>}
                        {jt.overtime&&(jt.overtimeDetails||[]).length>0&&<div style={{fontSize:11,color:"#D97706",paddingLeft:2,marginTop:2}}>残業：{(jt.overtimeDetails||[]).map(o=>`${o.name} ${o.hours}h`).join("、")}</div>}
                      </div>
                    ))}
                    {/* 遅刻 */}
                    {(rp.latecomers||[]).length>0&&(
                      <div style={{borderBottom:"1px solid #F1F5F9",padding:"6px 0",display:"flex"}}>
                        <div style={{width:80,fontSize:10,color:"#94A3B8",fontWeight:700,flexShrink:0}}>遅刻</div>
                        <div style={{fontSize:12,color:"#F59E0B",fontWeight:700}}>{(rp.latecomers||[]).map(l=>l.name).join("、")}</div>
                      </div>
                    )}
                    {/* 搬出入車両 */}
                    {(rp.vehicles||[]).length>0&&(
                      <div style={{borderBottom:"1px solid #F1F5F9",padding:"6px 0"}}>
                        <div style={{fontSize:10,color:"#94A3B8",fontWeight:700,marginBottom:3}}>搬出入車両</div>
                        <div style={{display:"flex",flexWrap:"wrap",gap:3}}>
                          {(rp.vehicles||[]).map((v,i)=><span key={i} style={{background:"#F8FAFC",border:"1px solid #E2E8F0",borderRadius:4,padding:"2px 7px",fontSize:11,color:"#475569"}}>{v.direction} / {v.contractType} / {v.size}車</span>)}
                        </div>
                      </div>
                    )}
                    <RF label="高速乗降" value={rp.highway}/>
                    <div style={{borderBottom:"1px solid #F1F5F9",padding:"6px 0",display:"flex"}}><div style={{width:80,fontSize:10,color:"#94A3B8",fontWeight:700,flexShrink:0}}>パーキング</div><div style={{fontSize:12,color:"#1E293B"}}>{rp.parking?`使用 ${rp.parkingFee||0}円`:"なし"}</div></div>
                    <RF label="ガソリン" value={rp.gas>0?`${rp.gas}円`:null}/>
                    <RF label="その他経費" value={rp.otherExpense}/>
                    <div style={{borderBottom:"1px solid #F1F5F9",padding:"6px 0",display:"flex"}}><div style={{width:80,fontSize:10,color:"#94A3B8",fontWeight:700,flexShrink:0}}>当欠</div><div style={{fontSize:12,color:(rp.absentees||[]).length>0?"#DC2626":"#E2E8F0",fontWeight:(rp.absentees||[]).length>0?700:400}}>{(rp.absentees||[]).length>0?(rp.absentees||[]).map(a=>a.name).join("、"):"なし"}</div></div>
                    <RF label="インシデント" value={rp.incident} warn={!!rp.incident}/>
                    <div style={{paddingTop:5,textAlign:"right",fontSize:10,color:"#94A3B8"}}>提出: {rp.by||"─"}{rp.locked?" 🔒":""}</div>
                  </div>
                </div>
              );
            })
          }
          {[...new Set(reports.filter(r=>r.date!==sel).map(r=>r.date))].sort((a,b)=>b.localeCompare(a)).slice(0,6).map(d=>(
            <div key={d} className="row" onClick={()=>setSel(d)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 12px",borderRadius:8,background:"#fff",marginBottom:4,border:"1px solid #E2E8F0",cursor:"pointer"}}>
              <span style={{fontSize:12,color:"#475569"}}>{d.replace(/-/g,"/")}（{DOW[parseD(d).getDay()]}）</span>
              <span style={{fontSize:11,color:"#94A3B8"}}>{reports.filter(r=>r.date===d).length}件 ▶</span>
            </div>
          ))}
        </div>
      </div>
    )}

    {/* ══ 月次集計 ══ */}
    {tab==="monthly"&&(()=>{
      const SH=({title,children,csvFn})=>(
        <div style={{background:"#fff",borderRadius:10,overflow:"hidden",border:"1px solid #E2E8F0",marginBottom:12}}>
          <div style={{background:"#F8FAFC",padding:"8px 12px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1px solid #E2E8F0"}}>
            <span style={{fontSize:11,color:"#475569",fontWeight:700}}>▍{title}</span>
            <button onClick={csvFn} style={{background:"#EEF2FF",border:"1px solid #C7D2FE",borderRadius:5,padding:"4px 9px",fontSize:10,color:"#4F46E5",fontWeight:700,cursor:"pointer"}}>📥 CSV</button>
          </div>
          {children}
        </div>
      );
      const TR=({cols,alt})=>(
        <div style={{display:"grid",gridTemplateColumns:cols.map(c=>c.w||"1fr").join(" "),padding:"9px 12px",borderBottom:"1px solid #F1F5F9",background:alt?"#FAFBFC":"#fff",alignItems:"center",gap:4}}>
          {cols.map((c,i)=><div key={i} style={{fontSize:c.s||12,fontWeight:c.b?700:400,color:c.c||"#1E293B",textAlign:c.center?"center":"left",fontFamily:c.num?"'Oswald',sans-serif":"inherit"}}>{c.v}</div>)}
        </div>
      );
      return(
      <div style={{height:"100%",overflowY:"auto",padding:12}}>
        <div style={{maxWidth:800,margin:"0 auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{fontFamily:"'Oswald',sans-serif",fontSize:18,color:"#F97316",letterSpacing:".06em"}}>月次集計</div>
              {!admin.isAdmin&&<button onClick={()=>setPWModal({title:"月次集計の編集には管理者権限が必要です",onSuccess:()=>{admin.login("_skip");setPWModal(null);}})} style={{background:"#F8FAFC",border:"1px solid #E2E8F0",borderRadius:6,padding:"4px 10px",fontSize:11,color:"#64748B",cursor:"pointer"}}>🔐 管理者ログイン</button>}
              {admin.isAdmin&&<button onClick={admin.logout} style={{background:"#F0FDF4",border:"1px solid #BBF7D0",borderRadius:6,padding:"4px 10px",fontSize:11,color:"#16A34A",cursor:"pointer"}}>ログアウト</button>}
            </div>
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              <button onClick={()=>{if(mM===1){setMY(y=>y-1);setMM(12);}else setMM(m=>m-1);}} style={{background:"#F1F5F9",border:"1px solid #E2E8F0",borderRadius:6,width:30,height:30,cursor:"pointer",fontSize:16}}>‹</button>
              <span style={{fontFamily:"'Oswald',sans-serif",fontSize:16,color:"#1E293B",minWidth:70,textAlign:"center"}}>{mY}/{Z(mM)}</span>
              <button onClick={()=>{if(mM===12){setMY(y=>y+1);setMM(1);}else setMM(m=>m+1);}} style={{background:"#F1F5F9",border:"1px solid #E2E8F0",borderRadius:6,width:30,height:30,cursor:"pointer",fontSize:16}}>›</button>
            </div>
          </div>

          <SH title="元請別" csvFn={()=>{const r=[["元請会社","日報件数","稼働日数","延べ人工"]];byClient.forEach(c=>r.push([c.name,c.cnt,c.dayCnt,c.workers]));dlCSV(`元請別_${mY}${Z(mM)}.csv`,r);}}>
            {byClient.length===0?<div style={{textAlign:"center",color:"#CBD5E1",padding:"14px",fontSize:12}}>データなし</div>
            :byClient.map((c,i)=><TR key={c.name} alt={i%2===1} cols={[{v:c.name,b:true},{w:"52px",v:c.cnt+"件",c:"#64748B",s:11,center:true},{w:"52px",v:c.dayCnt+"日",c:"#3B82F6",num:true,center:true},{w:"60px",v:c.workers+"人工",c:"#F97316",num:true,center:true}]}/>)}
          </SH>

          <SH title="現場別" csvFn={()=>{const r=[["現場名","日報件数","稼働日数","延べ人工"]];bySite.forEach(s=>r.push([s.name,s.cnt,s.dayCnt,s.workers]));dlCSV(`現場別_${mY}${Z(mM)}.csv`,r);}}>
            {bySite.length===0?<div style={{textAlign:"center",color:"#CBD5E1",padding:"14px",fontSize:12}}>データなし</div>
            :bySite.map((s,i)=>(
              <div key={s.id} style={{display:"grid",gridTemplateColumns:"1fr 52px 52px 60px",padding:"9px 12px",borderBottom:"1px solid #F1F5F9",background:i%2===1?"#FAFBFC":"#fff",alignItems:"center",gap:4,borderLeft:`3px solid ${s.color}`}}>
                <span style={{fontSize:12,fontWeight:700,color:s.color}}>{s.name}</span>
                <span style={{fontSize:11,color:"#64748B",textAlign:"center"}}>{s.cnt}件</span>
                <span style={{fontFamily:"'Oswald',sans-serif",fontSize:14,color:"#3B82F6",textAlign:"center"}}>{s.dayCnt}<span style={{fontSize:9}}>日</span></span>
                <span style={{fontFamily:"'Oswald',sans-serif",fontSize:14,color:"#F97316",textAlign:"center"}}>{s.workers}<span style={{fontSize:9}}>人工</span></span>
              </div>
            ))}
          </SH>

          <SH title="所属会社別" csvFn={()=>{const r=[["会社名","作業員数","延べ稼働"]];byCompany.forEach(c=>r.push([c.co,c.wCnt,c.days]));dlCSV(`会社別_${mY}${Z(mM)}.csv`,r);}}>
            {byCompany.length===0?<div style={{textAlign:"center",color:"#CBD5E1",padding:"14px",fontSize:12}}>データなし</div>
            :byCompany.map((c,i)=><TR key={c.co} alt={i%2===1} cols={[{v:c.co,b:true},{w:"60px",v:c.wCnt+"名",c:"#3B82F6",num:true,center:true},{w:"60px",v:c.days+"日",c:"#F97316",num:true,center:true}]}/>)}
          </SH>

          <SH title="作業員別" csvFn={()=>{const r=[["作業員名","所属会社","出勤日数","出勤日"]];byWorker.forEach(w=>r.push([w.name,w.co,w.cnt,w.dl.join(" / ")]));dlCSV(`作業員別_${mY}${Z(mM)}.csv`,r);}}>
            {byWorker.length===0?<div style={{textAlign:"center",color:"#CBD5E1",padding:"14px",fontSize:12}}>データなし</div>
            :byWorker.map((w,i)=>(
              <div key={w.name} style={{display:"grid",gridTemplateColumns:"1fr 1fr 48px",padding:"9px 12px",borderBottom:"1px solid #F1F5F9",background:i%2===1?"#FAFBFC":"#fff",alignItems:"start",gap:4}}>
                <div><div style={{fontSize:12,fontWeight:700,color:"#1E293B"}}>{w.name}</div><div style={{fontSize:9,color:"#94A3B8",marginTop:1}}>{w.dl.map(d=>d.slice(5).replace("-","/")).join("  ")}</div></div>
                <span style={{fontSize:11,color:"#64748B",paddingTop:2}}>{w.co}</span>
                <span style={{fontFamily:"'Oswald',sans-serif",fontSize:18,color:"#16A34A",textAlign:"center"}}>{w.cnt}<span style={{fontSize:9,color:"#94A3B8"}}>日</span></span>
              </div>
            ))}
          </SH>

          <SH title="当欠一覧" csvFn={()=>{const r=[["日付","現場","作業員名"]];mAbsent.forEach(a=>r.push([a.date,a.site,a.name]));dlCSV(`当欠_${mY}${Z(mM)}.csv`,r);}}>
            {mAbsent.length===0?<div style={{textAlign:"center",color:"#CBD5E1",padding:"14px",fontSize:12}}>当欠なし</div>
            :mAbsent.map((a,i)=>(
              <div key={`${a.date}-${a.name}`} style={{display:"grid",gridTemplateColumns:"52px 1fr 1fr",padding:"9px 12px",borderBottom:"1px solid #F1F5F9",background:i%2===1?"#FAFBFC":"#fff",alignItems:"center",gap:4}}>
                <span style={{fontSize:10,color:"#64748B"}}>{a.date.slice(5).replace("-","/")}</span>
                <span style={{fontSize:11,color:"#475569"}}>{a.site}</span>
                <span style={{fontSize:12,fontWeight:700,color:"#DC2626"}}>{a.name}</span>
              </div>
            ))}
          </SH>

          {/* 遅刻：作業員別 */}
          <SH title="遅刻一覧（作業員別）" csvFn={()=>{const r=[["作業員名","遅刻日数","日付"]];byWorkerLate.forEach(w=>r.push([w.name,w.cnt,w.dates.join(" / ")]));dlCSV(`遅刻_${mY}${Z(mM)}.csv`,r);}}>
            {byWorkerLate.length===0?<div style={{textAlign:"center",color:"#CBD5E1",padding:"14px",fontSize:12}}>遅刻なし</div>
            :byWorkerLate.map((w,i)=>(
              <div key={w.name} style={{display:"grid",gridTemplateColumns:"1fr 48px 2fr",padding:"9px 12px",borderBottom:"1px solid #F1F5F9",background:i%2===1?"#FAFBFC":"#fff",alignItems:"center",gap:4}}>
                <span style={{fontSize:12,fontWeight:700,color:"#F59E0B"}}>{w.name}</span>
                <span style={{fontFamily:"'Oswald',sans-serif",fontSize:16,color:"#F59E0B",textAlign:"center"}}>{w.cnt}<span style={{fontSize:9,color:"#94A3B8"}}>日</span></span>
                <span style={{fontSize:9,color:"#94A3B8"}}>{w.dates.map(d=>d.slice(5).replace("-","/")).join("  ")}</span>
              </div>
            ))}
          </SH>

          {/* 現場別：常用/請負人数 */}
          <SH title="現場別 常用・請負人数" csvFn={()=>{const r=[["現場名","常用（延べ人数）","請負（延べ人数）"]];bySiteJobType.forEach(s=>r.push([s.name,s.regular,s.contract]));dlCSV(`工事種別_${mY}${Z(mM)}.csv`,r);}}>
            {bySiteJobType.length===0?<div style={{textAlign:"center",color:"#CBD5E1",padding:"14px",fontSize:12}}>データなし</div>
            :bySiteJobType.map((s,i)=>(

          {/* 請負工事 予実管理 */}

            <div style={{background:"#F5F3FF",padding:"8px 12px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1px solid #DDD6FE"}}>
              <span style={{fontSize:11,color:"#6D28D9",fontWeight:700}}>▍請負工事 予実管理</span>

                const r=[["現場名","工程名","予定人工","実績人工","予定進捗%","実績進捗%","乖離%","状態"]];
                contractProgress.forEach(({task,site,progress:p})=>{
                  const st=p.gap>=0?"順調":p.gap>=-10?"やや遅延":"遅延";
                  r.push([site?.name||"",task.name,p.planned,p.actual,p.plannedPct,p.actualPct,p.gap,st]);
                });
                dlCSV(`請負予実_${mY}${Z(mM)}.csv`,r);
              }} style={{background:"#EDE9FE",border:"1px solid #DDD6FE",borderRadius:5,padding:"4px 9px",fontSize:10,color:"#7C3AED",fontWeight:700,cursor:"pointer"}}>📥 CSV</button>
            </div>
            {contractProgress.length===0
              ?<div style={{textAlign:"center",color:"#CBD5E1",padding:"18px",fontSize:12}}>請負工事（予実管理ON）の工程がありません</div>
              :contractProgress.map(({task,site,progress:p},i)=>{
                const gapColor=p.gap>=0?"#16A34A":p.gap>=-10?"#D97706":"#DC2626";
                const statusLabel=p.gap>=0?"✓ 順調":p.gap>=-10?"△ やや遅延":"✗ 遅延";
                return(
                  <div key={task.id} style={{padding:"10px 12px",borderBottom:"1px solid #F1F5F9",background:i%2===1?"#FAFBFC":"#fff"}}>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                      <div>
                        <div style={{display:"flex",alignItems:"center",gap:6}}>
                          <div style={{width:8,height:8,borderRadius:2,background:site?.color||"#94A3B8",flexShrink:0}}/>

                        </div>
                        <div style={{fontSize:9,color:"#94A3B8",marginTop:1,paddingLeft:14}}>{task.start} 〜 {task.end}</div>
                      </div>
                      <div style={{background:`${gapColor}14`,border:`1px solid ${gapColor}44`,borderRadius:6,padding:"3px 9px",fontSize:11,fontWeight:700,color:gapColor,flexShrink:0}}>{statusLabel}</div>

                    {/* 数値グリッド */}
                    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:4,marginBottom:7}}>
                      {[
                        {l:"予定人工",v:p.planned+"人工",c:"#3B82F6"},
                        {l:"実績人工",v:p.actual+"人工",c:gapColor},
                        {l:"予定進捗",v:p.plannedPct+"%",c:"#3B82F6"},
                        {l:"実績進捗",v:p.actualPct+"%",c:gapColor},
                      ].map(x=>(
                        <div key={x.l} style={{background:"#F8FAFC",borderRadius:6,padding:"5px 4px",textAlign:"center",border:"1px solid #E2E8F0"}}>
                          <div style={{fontSize:8,color:"#94A3B8"}}>{x.l}</div>
                          <div style={{fontFamily:"'Oswald',sans-serif",fontSize:14,fontWeight:700,color:x.c}}>{x.v}</div>
                        </div>
                      ))}
                    </div>
                    {/* 予実バー */}
                    <div style={{marginBottom:3}}>
                      <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:"#94A3B8",marginBottom:2}}>
                        <span>予定</span><span style={{color:"#3B82F6",fontWeight:700}}>{p.plannedPct}%</span>
                      </div>
                      <div style={{height:7,background:"#E2E8F0",borderRadius:3,overflow:"hidden"}}>
                        <div style={{height:"100%",width:`${Math.min(p.plannedPct,100)}%`,background:"#3B82F6",borderRadius:3}}/>
                      </div>
                    </div>
                    <div>
                      <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:"#94A3B8",marginBottom:2}}>
                        <span>実績</span>
                        <span style={{color:gapColor,fontWeight:700}}>{p.actualPct}% （乖離 {p.gap>=0?"+":""}{p.gap}%）</span>
                      </div>
                      <div style={{height:7,background:"#E2E8F0",borderRadius:3,overflow:"hidden"}}>
                        <div style={{height:"100%",width:`${Math.min(p.actualPct,100)}%`,background:gapColor,borderRadius:3,transition:"width .5s"}}/>

          {/* 管理者：日報編集・削除 */}

              <div style={{background:"#FFF7ED",padding:"8px 12px",borderBottom:"1px solid #FED7AA"}}>
                <span style={{fontSize:11,color:"#EA580C",fontWeight:700}}>🔐 管理者：日報一覧（編集・削除可）</span>
              </div>
              {mReports.length===0?<div style={{textAlign:"center",color:"#CBD5E1",padding:"14px",fontSize:12}}>データなし</div>

                return(
                  <div key={rp.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"9px 12px",borderBottom:"1px solid #F1F5F9",background:i%2===1?"#FAFBFC":"#fff"}}>

                      <div style={{fontSize:12,fontWeight:700,color:"#1E293B"}}>{rp.date} — {site?.name||"?"}</div>
                      <div style={{fontSize:10,color:"#94A3B8"}}>提出: {rp.by||"─"} / {rp.totalWorkers||0}名</div>
                    </div>
                    <div style={{display:"flex",gap:6}}>
                      <button onClick={()=>openModal("report","edit",{...rp,workers:rp.workers||[],overtimeDetails:rp.overtimeDetails||[],absentees:rp.absentees||[]})}
                        style={{background:"#EEF2FF",border:"1px solid #C7D2FE",borderRadius:6,padding:"4px 9px",fontSize:11,color:"#4F46E5",cursor:"pointer",fontWeight:700}}>編集</button>
                      <button onClick={()=>{if(window.confirm("削除しますか？"))set("reports",reports.filter(r=>r.id!==rp.id));}}
                        style={{background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:6,padding:"4px 9px",fontSize:11,color:"#DC2626",cursor:"pointer",fontWeight:700}}>削除</button>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>
      );
    })()}

    {/* ══ 設定 ══ */}
    {tab==="config"&&(
      <div style={{height:"100%",overflowY:"auto",padding:12}}>
        <div style={{maxWidth:600,margin:"0 auto"}}>
          <div style={{fontFamily:"'Oswald',sans-serif",fontSize:18,color:"#F97316",letterSpacing:".06em",marginBottom:14}}>設定・マスタ管理</div>

          {[
            {title:"元請け会社",color:"#3B82F6",items:clients,add:()=>openModal("client","add",{name:""}),row:cl=>(
              <div key={cl.id} className="row" onClick={()=>openModal("client","edit",{...cl})} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"11px 12px",borderBottom:"1px solid #F1F5F9",cursor:"pointer",background:"#fff"}}>
                <span style={{fontSize:13,fontWeight:700,color:"#1E293B"}}>{cl.name}</span><span style={{fontSize:10,color:"#CBD5E1"}}>▶</span>
              </div>
            )},
            {title:"現場一覧",color:"#F97316",items:sites,add:()=>openModal("site","add",{name:"",clientId:clients[0]?.id,capacity:4,color:COLORS[sites.length%COLORS.length]}),row:s=>{
              const cl=clients.find(c=>c.id===s.clientId);
              return(<div key={s.id} className="row" onClick={()=>openModal("site","edit",{...s})} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"11px 12px",borderBottom:"1px solid #F1F5F9",cursor:"pointer",background:"#fff",borderLeft:`3px solid ${s.color}`}}>
                <div><div style={{fontSize:13,fontWeight:700,color:s.color}}>{s.name}</div><div style={{fontSize:10,color:"#94A3B8",marginTop:1}}>{cl?.name||"─"} / 上限{s.capacity}人</div></div>
                <span style={{fontSize:10,color:"#CBD5E1"}}>▶</span>
              </div>);
            }},
            {title:"作業員マスタ",color:"#16A34A",items:workerMaster,add:()=>openModal("workerM","add",{name:"",company:"",note:""}),row:w=>(
              <div key={w.id} className="row" onClick={()=>openModal("workerM","edit",{...w})} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"11px 12px",borderBottom:"1px solid #F1F5F9",cursor:"pointer",background:"#fff"}}>
                <div><div style={{fontSize:13,fontWeight:700,color:"#1E293B"}}>{w.name}</div><div style={{fontSize:10,color:"#94A3B8",marginTop:1}}>{w.company}{w.note?` — ${w.note}`:""}</div></div>
                <span style={{fontSize:10,color:"#CBD5E1"}}>▶</span>
              </div>
            )},
          ].map(sec=>(
            <div key={sec.title} style={{marginBottom:16}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>
                <div style={{fontSize:13,fontWeight:700,color:sec.color}}>▍{sec.title}</div>
                <button onClick={sec.add} style={{background:`${sec.color}14`,border:`1px solid ${sec.color}44`,borderRadius:6,padding:"4px 11px",fontSize:11,color:sec.color,fontWeight:700,cursor:"pointer"}}>＋ 追加</button>
              </div>
              <div style={{background:"#fff",borderRadius:10,overflow:"hidden",border:"1px solid #E2E8F0"}}>
                {sec.items.length===0?<div style={{textAlign:"center",color:"#CBD5E1",padding:"14px",fontSize:12}}>未登録</div>:sec.items.map(sec.row)}
              </div>
            </div>
          ))}

          {/* パスワード管理 */}
          <div style={{marginBottom:16}}>
            <div style={{fontSize:13,fontWeight:700,color:"#6366F1",marginBottom:7}}>▍パスワード管理</div>
            <div style={{background:"#fff",borderRadius:10,border:"1px solid #E2E8F0",padding:"12px 14px"}}>
              {!admin.isAdmin
                ?<button onClick={()=>setPWModal({title:"管理者ログイン",onSuccess:()=>setPWModal(null)})} style={{width:"100%",background:"#EEF2FF",border:"1px solid #C7D2FE",borderRadius:8,padding:"11px",fontSize:13,color:"#4F46E5",fontWeight:700,cursor:"pointer"}}>🔐 管理者ログイン</button>
                :<div>
                  <div style={{fontSize:12,color:"#16A34A",fontWeight:700,marginBottom:10}}>✓ 管理者としてログイン中</div>

                  <button onClick={admin.logout} style={{width:"100%",background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:8,padding:"10px",fontSize:13,color:"#DC2626",fontWeight:700,cursor:"pointer",marginTop:8}}>ログアウト</button>
                </div>
              }
            </div>
          </div>

          {/* バックアップ */}
          <div style={{marginBottom:16}}>
            <div style={{fontSize:13,fontWeight:700,color:"#64748B",marginBottom:7}}>▍バックアップ</div>

              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                <button onClick={()=>{const s=JSON.parse(localStorage.getItem(LS)||"{}");const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([JSON.stringify(s,null,2)],{type:"application/json"}));a.download=`backup_${nowStr().replace(/[: ]/g,"-")}.json`;a.click();}} style={{background:"#EEF2FF",border:"1px solid #C7D2FE",borderRadius:8,padding:"10px",fontSize:12,color:"#4F46E5",fontWeight:700,cursor:"pointer"}}>📥 JSONバックアップ</button>
                <label style={{background:"#F0FDF4",border:"1px solid #BBF7D0",borderRadius:8,padding:"10px",fontSize:12,color:"#16A34A",fontWeight:700,cursor:"pointer",textAlign:"center"}}>
                  📂 JSONから復元
                  <input type="file" accept=".json" style={{display:"none"}} onChange={e=>{const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);localStorage.setItem(LS,JSON.stringify(d));alert("復元しました。ページを更新してください");}catch(_){alert("ファイルエラー");}};r.readAsText(e.target.files[0]);}}/>
                </label>

          </div>
        </div>
      </div>
